# ============================================================
# StockAI — docker-compose.yml
#
# 本地构建启动:
#   docker-compose up -d
#
# 从镜像仓库拉取:
#   docker-compose pull && docker-compose up -d
#
# 查看日志:
#   docker-compose logs -f
# ============================================================

services:
  stockai:
    # 改为你的阿里云镜像仓库地址，例如:
    # image: registry.cn-hangzhou.aliyuncs.com/<命名空间>/stockai:latest
    build: .
    container_name: stockai
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      # SQLite 数据库持久化
      - ./database:/app/database
      # Agent 记忆持久化
      - ./memory:/app/backend/memory
    restart: unless-stopped
