# 短线波段 — 低位放量 + 均线支撑 + 估值合理
# 适合：今日开盘买入，持有 1-3 天卖出
# 风险：短线波动大，必须设止损（买入价 * 0.97）
id: swing_short
name: 短线波段
description: >
  筛选价格<25元（一手<2500元）的低位放量股。
  条件：股价在MA20附近获支撑 + 成交量放大 + RSI从低位回升 + PE合理。
  适合开盘买入、短线持有1-3天。严格止损3%。
market_state: [neutral, bull]
recommended_position: "10-20%（单票）"
conditions:
  # ── 价格过滤：一手 2500 以内（L2实时行情，零成本筛选）──
  - field: price
    operator: "between"
    value: [3, 25]
  # ── 流动性：日均成交额 > 2000万，确保能进出 ──
  - field: avg_amount_20d
    operator: ">="
    value: 20000000
  # ── 技术面：均线多头 + 放量 ──
  - field: close
    operator: ">"
    compare_field: ma20
  - field: ma5
    operator: ">"
    compare_field: ma10
  - field: vol_ratio
    operator: ">="
    value: 1.2
  # ── 动量：短期有向上趋势 ──
  - field: ret_5d
    operator: ">="
    value: -5
  - field: ret_5d
    operator: "<="
    value: 15
  # ── RSI：不要超买 ──
  - field: rsi_14
    operator: ">="
    value: 30
  - field: rsi_14
    operator: "<="
    value: 65
  # ── 估值过滤 ──
  - field: pe
    operator: ">"
    value: 0
  - field: pe
    operator: "<="
    value: 60
sort_by: ret_5d
sort_order: asc
