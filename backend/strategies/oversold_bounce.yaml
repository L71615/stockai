# 超跌反弹 — 连续大跌后的技术修复
id: oversold_bounce
name: 超跌反弹
description: >
  连续下跌多日后，RSI 极度超卖 + 放量止跌。
  这是熊市中少数有赚钱效应的机会，但风险极高。
  必须严格止损（跌破入场日最低价无条件走人），单票仓位不超过 15%。
source: "Larry Connors 超卖反弹策略 (Short-Term Trading Strategies That Work)"
source_url: ""
tags: [超跌反弹, 逆势, 短线, 高风险, 熊市策略]
market_state: [bear]
recommended_position: "10-30%"
conditions:
  - field: ret_5d
    operator: "<="
    value: -8
  - field: rsi_14
    operator: "<="
    value: 25
  - field: vol_ratio
    operator: ">="
    value: 1.3
  - field: close
    operator: ">"
    compare_field: "open"
  - field: avg_amount_20d
    operator: ">="
    value: 30000000
sort_by: rsi_14
sort_order: asc
params:
  - name: ret_5d
    label: 5日跌幅门槛(%)
    type: number
    default: -8
    range: [-20, -3]
    step: 1
    description: "跌幅不够大不进场。越大越超跌但信号越少。注意输入负值"
  - name: rsi_14
    label: RSI上限
    type: number
    default: 25
    range: [15, 40]
    step: 1
    description: "越低越超卖越安全，但信号越少。熊市可放宽到30-35"
  - name: vol_ratio
    label: 量比门槛
    type: number
    default: 1.3
    range: [0.8, 3.0]
    step: 0.1
    description: "放量止跌才有意义。低于1.0=缩量跌，不接"
  - name: avg_amount_20d
    label: 日均成交额门槛
    type: number
    default: 30000000
    range: [10000000, 200000000]
    step: 10000000
    description: "超跌股也需要流动性支撑反弹"
