# 超跌反弹 — 连续大跌后的技术修复
id: oversold_bounce
name: 超跌反弹
description: >
  连续下跌多日后，RSI 极度超卖 + 放量止跌。
  这是熊市中少数有赚钱效应的机会，但风险极高。
  必须严格止损（跌破入场日最低价无条件走人），单票仓位不超过 15%。
market_state: [bear]
recommended_position: "10-30%"
conditions:
  - field: ret_5d
    operator: "<="
    value: -8
  - field: rsi_14
    operator: "<="
    value: 25
  - field: vol_ratio
    operator: ">="
    value: 1.3
  - field: close
    operator: ">"
    compare_field: "open"
  - field: avg_amount_20d
    operator: ">="
    value: 30000000
sort_by: rsi_14
sort_order: asc
