<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球指数 — StockAI</title>
<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockAI">
<link rel="manifest" href="./manifest.json">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(function(){})}</script>
<link rel="stylesheet" href="css/common.css">
<style>
  .indices-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 16px; }
  .idx-card {
    background: var(--bg-secondary);
    border-radius: 8px;
    padding: 14px 16px;
    border: 1px solid var(--border-light);
    transition: background 0.15s;
  }
  .idx-card:hover { background: var(--bg-hover); }
  .idx-card .idx-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .idx-card .idx-code { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .idx-card .idx-price { font-size: 20px; font-weight: 700; margin-top: 8px; font-variant-numeric: tabular-nums; }
  .idx-card .idx-sub { font-size: 12px; margin-top: 2px; }
  .idx-card .up { color: var(--red); }
  .idx-card .down { color: var(--green); }
  .region-divider {
    grid-column: 1 / -1;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    padding: 12px 4px 0 4px;
    border-top: 1px solid var(--border-light);
  }
  .region-divider:first-child { border-top: none; padding-top: 0; }
  .update-info {
    padding: 8px 16px 16px;
    font-size: 11px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="header"></div>
    <div class="content">

      <div class="card">
        <div class="card-header"><span>全球主要指数</span></div>
        <div id="marketContent"></div>
      </div>

    </div>
  </main>
</div>
<script src="js/common.js"></script>
<script>
initPage('market', '💹 全球指数');

async function loadMarket() {
  const container = document.getElementById('marketContent');
  showLoading(container);
  try {
    const indices = await apiGet('/api/stocks/indices/global');

    if (!indices.length) {
      showEmpty(container, '无法获取指数数据');
      return;
    }

    // 按地区分组
    const groups = {};
    indices.forEach(idx => {
      const r = idx.region || '其他';
      if (!groups[r]) groups[r] = [];
      groups[r].push(idx);
    });

    const cardEls = [];
    for (const [region, items] of Object.entries(groups)) {
      cardEls.push(`<div class="region-divider">${region}</div>`);
      items.forEach(idx => {
        const cls = idx.change > 0 ? 'up' : idx.change < 0 ? 'down' : '';
        const sign = idx.change > 0 ? '+' : '';
        cardEls.push(`
          <div class="idx-card">
            <div class="idx-name">${idx.name}</div>
            <div class="idx-code">${idx.code}</div>
            <div class="idx-price ${cls}">${idx.price != null ? idx.price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '--'}</div>
            <div class="idx-sub ${cls}">${sign}${idx.change != null ? idx.change.toFixed(2) : '--'} &nbsp; ${sign}${idx.change_pct != null ? idx.change_pct.toFixed(2) : '--'}%</div>
          </div>
        `);
      });
    }

    container.innerHTML = `
      <div class="indices-grid">${cardEls.join('')}</div>
      <div class="update-info">实时数据 · 东方财富 · ${new Date().toLocaleString('zh-CN')}</div>
    `;
  } catch (err) {
    showError(container, err);
  }
}

loadMarket();
// 每30秒自动刷新
setInterval(loadMarket, 30000);
</script>
</body>
</html>
