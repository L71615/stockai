<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 助手 — StockAI</title>
<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockAI">
<link rel="manifest" href="./manifest.json">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(function(){})}</script>
<link rel="stylesheet" href="css/common.css">
<style>
  .ai-toolbar { display: flex; gap: 10px; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .ai-toolbar select { width: auto; min-width: 160px; }
  .quick-cmds { display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border-light); flex-wrap: wrap; }
  .quick-cmd { font-size: 11px; padding: 4px 10px; border-radius: var(--radius-sm); background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; transition: .15s; white-space: nowrap; }
  .quick-cmd:hover { border-color: var(--accent); color: var(--accent-light); background: var(--accent-bg); }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="header"></div>
    <div class="content">

      <div class="ai-panel" style="flex:1;min-height:450px;display:flex;flex-direction:column;">
        <div class="ai-panel-header">
          <span class="ai-dot"></span> AI 智能助手
        </div>

        <div class="ai-toolbar">
          <select class="form-input" id="agentSelect" onchange="onAgentChange()">
            <option value="">通用助手</option>
          </select>
          <span id="agentTools" class="text-sm text-secondary"></span>
        </div>

        <div class="quick-cmds" id="quickCmds">
          <button class="quick-cmd" onclick="quickSend('请分析我当前持仓的风险和收益情况')">📊 分析持仓</button>
          <button class="quick-cmd" onclick="quickSend('请帮我复盘最近的交易记录')">📈 交易复盘</button>
          <button class="quick-cmd" onclick="quickSend('基于当前市场情况，我的定投策略需要调整吗？')">💰 定投建议</button>
          <button class="quick-cmd" onclick="quickSend('今日大盘走势如何？')">💹 大盘解读</button>
          <button class="quick-cmd" onclick="quickSend('请根据今日最新的行业新闻分析我的持仓情况')">📰 持仓新闻分析</button>
        </div>

        <div class="ai-messages" id="aiMessages" style="flex:1;max-height:none;">
          <div class="ai-msg assistant">
            你好！我是 StockAI 助手。<br><br>
            请先在 <a href="settings.html">设置页</a> 配置 AI 服务商和 API Key。<br>
            在 <a href="skills.html">Agent 工坊</a> 创建 Agent 后，可在此选择使用。
          </div>
        </div>

        <div class="ai-input-row">
          <input type="text" id="aiInput" placeholder="输入你的问题…">
          <button id="aiSend">发送</button>
        </div>
      </div>

    </div>
  </main>
</div>
<script src="js/common.js"></script>
<script>
initPage('ai', '🤖 AI 助手');

let conversationId = null;
let currentAgentPrompt = '';
let currentAgentId = null;

async function loadAgents() {
  try {
    const agents = await apiGet('/api/agents/agents');
    const sel = document.getElementById('agentSelect');
    agents.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = a.name;
      opt.dataset.prompt = a.system_prompt || '';
      opt.dataset.tools = a.tools || '[]';
      sel.appendChild(opt);
    });
  } catch(e) { /* Agent 列表加载失败不影响对话 */ }
}

function onAgentChange() {
  const sel = document.getElementById('agentSelect');
  const opt = sel.selectedOptions[0];
  if (opt && opt.dataset.prompt) {
    currentAgentId = parseInt(opt.value);
    currentAgentPrompt = opt.dataset.prompt;
    let tools = [];
    try { tools = JSON.parse(opt.dataset.tools); } catch(e) {}
    document.getElementById('agentTools').textContent = tools.length ? '能力: ' + tools.join(', ') : '';
  } else {
    currentAgentId = null;
    currentAgentPrompt = '';
    document.getElementById('agentTools').textContent = '';
  }
}

function addMessage(text, role) {
  const el = document.getElementById('aiMessages');
  const div = document.createElement('div');
  div.className = 'ai-msg ' + role;
  div.innerHTML = text.replace(/\n/g, '<br>');
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function quickSend(msg) {
  document.getElementById('aiInput').value = msg;
  handleSend();
}

async function handleSend() {
  const input = document.getElementById('aiInput');
  const msg = input.value.trim();
  if (!msg) return;
  addMessage(msg, 'user');
  input.value = '';

  const cfg = getAIConfig();
  if (!cfg.apiKey) {
    addMessage('请先在 <a href="settings.html">设置页</a> 配置 API Key', 'assistant');
    return;
  }

  try {
    const data = await apiPost('/api/ai/chat', {
      message: msg,
      conversationId,
      agentId: currentAgentId,
      provider: cfg.provider,
      apiKey: cfg.apiKey,
      model: cfg.model,
      baseUrl: cfg.baseUrl || '',
      systemPrompt: currentAgentPrompt,
    });
    conversationId = data.conversationId;
    addMessage(data.reply, 'assistant');
  } catch(err) {
    addMessage('发送失败: ' + err.message, 'assistant');
  }
}

document.getElementById('aiSend').addEventListener('click', handleSend);
document.getElementById('aiInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

loadAgents();
</script>
</body>
</html>
