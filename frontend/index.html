<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的持仓 — StockAI</title>
<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockAI">
<link rel="manifest" href="./manifest.json">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(function(){})}</script>
<link rel="stylesheet" href="css/common.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .news-item { padding: 10px 0; border-bottom: 1px solid var(--border-light); }
  .news-item:last-child { border-bottom: none; }
  .news-title { font-size: 13px; font-weight: 500; color: var(--text); text-decoration: none; }
  .news-title:hover { color: var(--accent-light); }
  .news-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .news-snippet { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }
  .dca-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: 20px; background: rgba(34,197,94,0.1); color: #22c55e; cursor: pointer; }
  .dca-badge.paused { background: rgba(148,163,184,0.1); color: var(--text-muted); }
  .dca-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .dca-modal.show { display: flex; }
  .dca-modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 380px; max-width: 90vw; }
  .dca-form-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: flex-end; }
  .dca-form-row .form-group { flex: 1; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .bar-label { width: 60px; text-align: right; flex-shrink: 0; color: var(--text-secondary); }
  .bar-track { flex: 1; height: 18px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .3s; }
  .bar-pct { width: 44px; text-align: left; font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
  .bar-fill.green { background: rgba(34,197,94,0.4); }
  .bar-fill.yellow { background: rgba(234,179,8,0.4); }
  .bar-fill.red { background: rgba(239,68,68,0.4); }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="header"></div>
    <div class="content">

      <div id="aiSummaryBar" style="display:none"></div>
      <div class="kpi-row" id="kpiRow"></div>

      <div class="card" id="diversCard" style="display:none;">
        <div class="card-header">
          <span>📊 持仓分散度</span>
          <span id="riskBadge" class="tag"></span>
        </div>
        <div class="card-body" id="diversContent" style="display:flex;gap:24px;flex-wrap:wrap;">
          <div style="flex:1;min-width:200px;">
            <div class="text-sm text-secondary" style="margin-bottom:8px;">行业分布</div>
            <div id="industryChart"></div>
          </div>
          <div style="flex:1;min-width:200px;">
            <div class="text-sm text-secondary" style="margin-bottom:8px;">市场分布</div>
            <div id="marketChart"></div>
          </div>
        </div>
        <div id="riskWarning" style="padding:8px 20px 16px;font-size:13px;line-height:1.6;"></div>
      </div>

      <!-- 大盘对比 -->
      <div class="card" id="peerCard" style="display:none;">
        <div class="card-header">
          <span>📈 大盘对比</span>
          <span id="peerIndices" style="font-size:12px;color:var(--text-secondary);"></span>
        </div>
        <div class="card-body" id="peerContent" style="font-size:13px;line-height:1.8;"></div>
      </div>

      <!-- 组合切换标签 -->
      <div id="pfTabs" style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm pf-tab" data-id="" onclick="switchPortfolio('')">全部</button>
        <span id="pfTabsInner"></span>
        <button class="btn btn-outline btn-sm" onclick="showAddPf()" style="font-size:16px;line-height:1;padding:4px 8px;" title="新建组合">＋</button>
      </div>

      <div class="card">
        <div class="card-header">
          <span>持仓明细</span>
          <button class="btn btn-primary btn-sm" onclick="showAddForm()">＋ 添加持仓</button>
        </div>
        <div id="addForm" style="display:none;padding:12px 20px;border-bottom:1px solid var(--border);gap:8px;align-items:flex-end;flex-wrap:wrap;">
          <div style="position:relative;">
            <label class="form-label">代码</label>
            <input class="form-input" id="addCode" placeholder="600519" style="width:100px;" oninput="onCodeInput()">
            <div id="lookupPreview" style="display:none;position:absolute;top:100%;left:0;z-index:10;background:var(--bg-card);border:1px solid var(--accent);border-radius:8px;padding:10px 14px;margin-top:4px;min-width:220px;box-shadow:0 4px 16px rgba(0,0,0,.4);">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
                <span id="lpName" style="font-weight:600;font-size:13px;"></span>
                <span id="lpType" style="font-size:10px;padding:1px 6px;border-radius:10px;"></span>
              </div>
              <div style="display:flex;gap:12px;align-items:baseline;">
                <span id="lpPrice" style="font-size:16px;font-weight:600;"></span>
                <span id="lpChange" style="font-size:12px;"></span>
              </div>
            </div>
          </div>
          <div>
            <label class="form-label">名称</label>
            <input class="form-input" id="addName" placeholder="贵州茅台" style="width:120px;">
          </div>
          <div id="addMarketGroup">
            <label class="form-label">市场</label>
            <select class="form-input" id="addMarket" style="width:70px;">
              <option value="SH">沪</option><option value="SZ">深</option><option value="BJ">北</option>
            </select>
          </div>
          <div>
            <label class="form-label">类型</label>
            <select class="form-input" id="addType" style="width:80px;" onchange="onTypeChange()">
              <option value="">自动</option><option value="stock">股票</option><option value="etf">ETF</option><option value="fund">基金</option>
            </select>
          </div>
          <div id="addQtyGroup">
            <label class="form-label" id="addQtyLabel">数量(股)</label>
            <input class="form-input" id="addQty" type="number" placeholder="100" style="width:100px;">
          </div>
          <div id="addCostGroup">
            <label class="form-label" id="addCostLabel">成本价(元)</label>
            <input class="form-input" id="addCost" type="number" step="0.001" placeholder="1680.00" style="width:110px;">
          </div>
          <div id="addFundAmountGroup" style="display:none;">
            <label class="form-label">投入金额(元)</label>
            <input class="form-input" id="addFundAmount" type="number" step="0.01" placeholder="10000">
          </div>
          <div>
            <label class="form-label">组合</label>
            <select class="form-input" id="addPfId" style="width:90px;"><option value="">未分类</option></select>
          </div>
          <button class="btn btn-primary btn-sm" onclick="addHolding()">确认添加</button>
          <button class="btn btn-outline btn-sm" onclick="hideAddForm()">取消</button>
        </div>
        <div id="holdingsTable"></div>
      </div>

      <!-- 定投编辑弹窗 -->
      <div class="dca-modal" id="dcaModal">
        <div class="dca-modal-content">
          <h4 style="margin-bottom:16px;" id="dcaModalTitle">定投计划</h4>
          <input type="hidden" id="dcaId">
          <input type="hidden" id="dcaHoldingId">
          <input type="hidden" id="dcaStockCode">
          <input type="hidden" id="dcaStockName">
          <div class="dca-form-row">
            <div class="form-group">
              <label class="form-label">定投周期</label>
              <select class="form-input" id="dcaCycle" onchange="onDcaCycleChange()">
                <option value="daily">每天</option>
                <option value="weekly">每周</option>
                <option value="biweekly">双周</option>
                <option value="monthly" selected>每月</option>
              </select>
            </div>
            <div class="form-group" id="dcaCycleDayGroup">
              <label class="form-label" id="dcaDayLabel">定投日</label>
              <input class="form-input" id="dcaCycleDay" type="number" min="1" max="28" value="1">
            </div>
          </div>
          <div class="dca-form-row">
            <div class="form-group">
              <label class="form-label">每次金额(元)</label>
              <input class="form-input" id="dcaAmount" type="number" step="100" placeholder="1000">
            </div>
            <div class="form-group">
              <label class="form-label">下次扣款日</label>
              <input class="form-input" id="dcaNextDate" type="date">
            </div>
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
            <button class="btn btn-outline btn-sm" id="dcaDeleteBtn" style="display:none;" onclick="deleteDca()">删除计划</button>
            <button class="btn btn-outline btn-sm" onclick="hideDcaForm()">取消</button>
            <button class="btn btn-primary btn-sm" onclick="saveDca()">保存</button>
          </div>
        </div>
      </div>

      <!-- 价格预警弹窗 -->
      <div class="dca-modal" id="alertModal">
        <div class="dca-modal-content">
          <h4 style="margin-bottom:16px;" id="alertModalTitle">🔔 价格预警</h4>
          <input type="hidden" id="alertStockCode">
          <div class="dca-form-row">
            <div class="form-group">
              <label class="form-label">预警类型</label>
              <select class="form-input" id="alertType">
                <option value="above">价格涨超</option>
                <option value="below">价格跌超</option>
                <option value="pct_change">涨跌幅超</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" id="alertTargetLabel">目标价格</label>
              <input class="form-input" id="alertTarget" type="number" step="0.01" placeholder="0.00">
            </div>
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button class="btn btn-outline btn-sm" onclick="deleteAlert()" id="alertDeleteBtn" style="display:none;">清除预警</button>
            <button class="btn btn-outline btn-sm" onclick="hideAlertForm()">取消</button>
            <button class="btn btn-primary btn-sm" onclick="saveAlert()">保存</button>
          </div>
        </div>
      </div>

      <!-- 股息记录弹窗 -->
      <div class="dca-modal" id="divModal">
        <div class="dca-modal-content">
          <h4 style="margin-bottom:16px;" id="divModalTitle">💰 记录股息</h4>
          <input type="hidden" id="divStockCode">
          <div class="dca-form-row">
            <div class="form-group">
              <label class="form-label">每股分红(元)</label>
              <input class="form-input" id="divPerShare" type="number" step="0.01" placeholder="0.50">
            </div>
            <div class="form-group">
              <label class="form-label">持股数量</label>
              <input class="form-input" id="divQty" type="number" placeholder="100" onchange="calcDivTotal()">
            </div>
          </div>
          <div class="dca-form-row">
            <div class="form-group">
              <label class="form-label">除权日期</label>
              <input class="form-input" id="divDate" type="date">
            </div>
            <div class="form-group">
              <label class="form-label">总金额(元)</label>
              <input class="form-input" id="divTotal" type="number" step="0.01" readonly>
            </div>
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;">
            <button class="btn btn-outline btn-sm" onclick="hideDivForm()">取消</button>
            <button class="btn btn-primary btn-sm" onclick="saveDividend()">保存</button>
          </div>
        </div>
      </div>

      <!-- 技术指标弹窗 -->
      <div class="dca-modal" id="indModal">
        <div class="dca-modal-content" style="width:420px;">
          <h4 style="margin-bottom:16px;" id="indModalTitle">📈 技术指标</h4>
          <div id="indContent" style="font-size:13px;line-height:1.8;"></div>
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">
            <button class="btn btn-outline btn-sm" onclick="aiInterpret()" id="indAiBtn">🤖 AI 解读</button>
            <button class="btn btn-outline btn-sm" onclick="hideIndicators()">关闭</button>
          </div>
        </div>
      </div>

      <!-- 追加买入弹窗 -->
      <div class="dca-modal" id="lotModal">
        <div class="dca-modal-content">
          <h4 style="margin-bottom:16px;" id="lotModalTitle">追加买入</h4>
          <input type="hidden" id="lotHoldingId">
          <input type="hidden" id="lotAssetType">
          <div class="dca-form-row">
            <div class="form-group" id="lotDateGroup">
              <label class="form-label">买入日期</label>
              <input class="form-input" id="lotDate" type="date">
            </div>
            <div class="form-group" id="lotAmountGroup">
              <label class="form-label">投入金额(元)</label>
              <input class="form-input" id="lotAmount" type="number" step="0.01" placeholder="1000" oninput="calcLotShares()">
            </div>
          </div>
          <div class="dca-form-row">
            <div class="form-group" id="lotNavGroup">
              <label class="form-label">当日净值</label>
              <input class="form-input" id="lotNav" type="number" step="0.0001" placeholder="自动获取中…" oninput="calcLotShares()">
            </div>
            <div class="form-group" id="lotSharesGroup">
              <label class="form-label">获得份额</label>
              <input class="form-input" id="lotShares" type="text" readonly placeholder="自动计算">
            </div>

          <div class="dca-form-row" id="lotStockFields" style="display:none;">
            <div class="form-group">
              <label class="form-label">数量(股)</label>
              <input class="form-input" id="lotQty" type="number" placeholder="100" oninput="calcLotAmount()">
            </div>
            <div class="form-group">
              <label class="form-label">买入价</label>

          <div class="dca-form-row">

          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
            <button class="btn btn-outline btn-sm" onclick="hideLotForm()">取消</button>
            <button class="btn btn-primary btn-sm" onclick="addLot()">确认追加</button>
          </div>

      <!-- 批次历史弹窗 -->
      <div class="dca-modal" id="lotsModal">
        <div class="dca-modal-content" style="width:460px;max-height:70vh;overflow-y:auto;">

      <!-- 历史数据导入弹窗 -->

          <div style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.6;" id="importFormatHint">

          </div>
          <input type="hidden" id="importHoldingId">
          <input type="hidden" id="importStockCode">
          <input type="hidden" id="importStockName">
          <input type="hidden" id="importAssetType">
          <div class="form-group">
            <label class="form-label">粘贴历史记录（每行一条）</label>
            <textarea class="form-input" id="importText" rows="8" placeholder="2024-01-05 1000 1.2345&#10;2024-02-05 1000 1.3456&#10;2024-03-05 1000 1.2345" style="resize:vertical;font-family:var(--font-mono);font-size:12px;"></textarea>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:12px;">

          </div>

            </div>
            <div style="max-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px;">
              <table class="data-table" style="font-size:12px;">

                <tbody id="importPreviewBody"></tbody>

              <button class="btn btn-outline btn-sm" onclick="hideImportForm()">取消</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card" id="newsCard">
        <div class="card-header" style="cursor:pointer;" onclick="toggleNews()">
          <span>📰 持仓相关新闻</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span id="newsCount" class="text-sm text-secondary"></span>
            <button class="btn btn-outline btn-sm" onclick="event.stopPropagation();loadNews()">刷新</button>
            <span id="newsToggleIcon">▼</span>
          </div>
        </div>
        <div id="newsContent">
          <div class="empty-state">
            <p>点击上方刷新按钮或展开按钮加载相关新闻</p>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>
<script src="js/common.js"></script>
<script>
initPage('holdings', '我的持仓');

let _currentPfId = '';
let _journalMap = {};

async function loadPortfolios() {
  try {
    const pfs = await apiGet('/api/stocks/portfolios');
    window._portfolios = pfs;
    // 更新标签
    let tabsHtml = pfs.map(p => {
      const active = _currentPfId === String(p.id) ? 'btn-primary' : 'btn-outline';
      return `<button class="btn btn-sm pf-tab ${active}" data-id="${p.id}" onclick="switchPortfolio('${p.id}')">${p.name}</button>`;
    }).join('');
    document.getElementById('pfTabsInner').innerHTML = tabsHtml;
    // 更新添加表单的组合选项
    const sel = document.getElementById('addPfId');
    if (sel) {
      sel.innerHTML = '<option value="">未分类</option>' + pfs.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }
  } catch(e) {}
}

function switchPortfolio(id) {
  _currentPfId = String(id);
  document.querySelectorAll('.pf-tab').forEach(b => {
    b.classList.toggle('btn-primary', b.dataset.id === _currentPfId);
    b.classList.toggle('btn-outline', b.dataset.id !== _currentPfId);
  });
  loadHoldings();
}

async function showAddPf() {
  const name = await showPrompt('请输入组合名称（如：长线、短线、实验仓）：', '');
  if (!name) return;
  const typeMap = { '长线': 'long', '短线': 'short', '实验仓': 'experiment' };
  const type = typeMap[name] || 'long';
  try {
    await apiPost('/api/stocks/portfolios', { name, type });
    loadPortfolios();
    loadHoldings();
  } catch (e) { /* ignore */ }
}

async function loadHoldings() {
  const kpiRow = document.getElementById('kpiRow');
  const table = document.getElementById('holdingsTable');
  showLoading(kpiRow);
  showLoading(table);

  try {
    const url = _currentPfId ? '/api/stocks/holdings/with-pnl?portfolio_id=' + _currentPfId : '/api/stocks/holdings/with-pnl';
    const [data, dcaPlans, alerts, divSummary, xirrData] = await Promise.all([
      apiGet(url),
      apiGet('/api/stocks/dca'),
      apiGet('/api/stocks/alerts'),
      apiGet('/api/stocks/dividends/summary'),
      apiGet('/api/stocks/holdings/xirr').catch(() => ({ total_xirr: null })),
    ]);

    const holdings = data.holdings;
    const summary = data.summary;
    holdings.forEach(h => { _journalMap[h.id] = h.journal || ''; });

    if (!holdings.length) {
      kpiRow.innerHTML = '';
      showEmpty(table, '还没有持仓记录');
      return;
    }

    const dcaMap = {};
    dcaPlans.forEach(d => { dcaMap[d.holding_id] = d; });
    window._dcaCache = dcaMap;

    const alertMap = {};
    alerts.forEach(a => {
      if (!alertMap[a.stock_code]) alertMap[a.stock_code] = [];
      alertMap[a.stock_code].push(a);
    });
    window._alertCache = alertMap;

    const divMap = {};
    (divSummary.by_stock || []).forEach(d => { divMap[d.stock_code] = d.total_div; });

    // 统计资产类型
    const typeCounts = { stock: 0, etf: 0, fund: 0 };
    holdings.forEach(h => { const t = h.asset_type || 'stock'; typeCounts[t] = (typeCounts[t] || 0) + 1; });

let _lookupTimer = null;

async function onCodeInput() {
  const code = document.getElementById('addCode').value.trim();
  const preview = document.getElementById('lookupPreview');
  const lpName = document.getElementById('lpName');
  const lpType = document.getElementById('lpType');
  const lpPrice = document.getElementById('lpPrice');
  const lpChange = document.getElementById('lpChange');

  if (code.length < 5) {
    preview.style.display = 'none';
    return;
  }

  // debounce 400ms — wait for user to finish typing
  clearTimeout(_lookupTimer);
  _lookupTimer = setTimeout(async () => {
    // re-read code in case it changed during timeout
    const currentCode = document.getElementById('addCode').value.trim();
    if (currentCode.length < 5) { preview.style.display = 'none'; return; }

    try {
      const data = await apiGet('/api/stocks/lookup/' + currentCode);
      // Fill preview
      lpName.textContent = data.name || currentCode;
      const TYPE_LABELS = {stock:'股票',etf:'ETF',fund:'基金'};
      const TYPE_TAGS = {stock:'tag tag-sh', etf:'tag tag-sz', fund:'tag tag-bj'};
      lpType.textContent = TYPE_LABELS[data.type] || data.type;
      lpType.className = TYPE_TAGS[data.type] || '';
      lpPrice.textContent = data.price != null ? '¥' + Number(data.price).toFixed((data.type==='fund'||data.type==='etf')?4:2) : '';
      const pct = data.change_pct;
      lpChange.textContent = pct != null ? (pct>=0?'+':'') + Number(pct).toFixed(2) + '%' : '';
      lpChange.className = getChangeClass(pct);
      preview.style.display = 'block';

      // Auto-fill name if empty
      const nameInput = document.getElementById('addName');
      if (!nameInput.value && data.name) nameInput.value = data.name;

      // Auto-set type and market
      const typeSel = document.getElementById('addType');
      if (!typeSel.value && data.type) {
        typeSel.value = data.type;
        onTypeChange();
      }
      if (data.type === 'stock' || data.type === 'etf') {
        document.getElementById('addMarket').value = codeToMarket(currentCode);
      }
    } catch (e) {
      // not found — show subtle hint
      lpName.textContent = '未找到';
      lpType.textContent = '';
      lpType.className = '';
      lpPrice.textContent = '';
      lpChange.textContent = '';
      lpChange.className = '';
      preview.style.display = 'block';
    }
  }, 400);
}

function onTypeChange() {
  const at = document.getElementById('addType').value;
  const fundGroup = document.getElementById('addFundAmountGroup');
  const qtyGroup = document.getElementById('addQtyGroup');
  const costGroup = document.getElementById('addCostGroup');
  const qtyLabel = document.getElementById('addQtyLabel');
  const costLabel = document.getElementById('addCostLabel');
  const marketGroup = document.getElementById('addMarketGroup');

  if (at === 'fund') {
    if (fundGroup) fundGroup.style.display = '';
    if (qtyGroup) qtyGroup.style.display = 'none';
    if (costGroup) costGroup.style.display = 'none';
    if (marketGroup) marketGroup.style.display = 'none';
  } else {
    if (fundGroup) fundGroup.style.display = 'none';
    if (qtyGroup) qtyGroup.style.display = '';
    if (costGroup) costGroup.style.display = '';
    if (marketGroup) marketGroup.style.display = '';
  }
}

async function addHolding() {
  const code = document.getElementById('addCode').value.trim();
  const name = document.getElementById('addName').value.trim();
  const at = document.getElementById('addType').value;
  const market = document.getElementById('addMarket') ? document.getElementById('addMarket').value : 'SZ';
  const pfId = document.getElementById('addPfId').value;

  if (!code || !name) return showToast('请填写代码和名称', 'warning');

  let body = { stock_code: code, stock_name: name, market, asset_type: at, portfolio_id: pfId ? parseInt(pfId) : null };

  if (at === 'fund') {
    const amount = parseFloat(document.getElementById('addFundAmount').value);
    if (!amount || amount <= 0) return showToast('请填写有效的投入金额', 'warning');
    // 通过天天基金获取最新净值作为成本净值
    try {
      const navData = await apiGet('/api/stocks/fund-nav/' + code);
      if (navData && navData.nav) {
        const shares = amount / navData.nav;
        body.quantity = Math.round(shares * 100) / 100;
        body.shares = body.quantity;
        body.cost_price = navData.nav;
      } else {
        return showToast('无法获取基金净值，请手动填写份额和成本净值', 'warning');
      }
    } catch (e) {
      return showToast('获取基金净值失败: ' + e.message, 'error');
    }
  } else {
    const qty = parseInt(document.getElementById('addQty').value);
    const cost = parseFloat(document.getElementById('addCost').value);
    if (!qty || qty <= 0) return showToast('请填写有效的持仓数量', 'warning');
    if (!cost || cost <= 0) return showToast('请填写有效的成本价', 'warning');
    body.quantity = qty;
    body.cost_price = cost;
  }

  await apiPost('/api/stocks/holdings', body);
  hideAddForm();
  loadHoldings();
}

async function saveDca() {
  const existingId = document.getElementById('dcaId').value;
  const holdingId = parseInt(document.getElementById('dcaHoldingId').value);
  const stockCode = document.getElementById('dcaStockCode').value;
  const stockName = document.getElementById('dcaStockName').value;
  const cycle = document.getElementById('dcaCycle').value;
  const cycleDay = parseInt(document.getElementById('dcaCycleDay').value) || 1;
  const amount = parseFloat(document.getElementById('dcaAmount').value);
  const nextDeduction = document.getElementById('dcaNextDate').value;

  if (!amount || amount <= 0) return showToast('请填写有效的定投金额', 'warning');

  const body = {
    holding_id: holdingId,
    stock_code: stockCode,
    stock_name: stockName,
    cycle,
    cycle_day: cycleDay,
    amount,
    next_deduction: nextDeduction,
  };

  try {
    if (existingId) {
      await apiPut('/api/stocks/dca/' + existingId, {
        cycle, cycle_day: cycleDay, amount,

    loadHoldings();

// ========================= 环形饼图 =========================
function drawDonut(containerId, items) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  if (!items || !items.length) {
    container.innerHTML = '<div class="text-secondary text-sm">无数据</div>';
    return;
  }

  const colors = ['#7c8ae0','#26a69a','#ef5350','#f59e0b','#3b82f6',
                  '#c4b5fd','#60a5fa','#f87171','#a78bfa','#34d399'];
  const size = 180;
  const radius = 65;
  const hole = 35;

  const canvas = document.createElement('canvas');
  canvas.width = size * 2;
  canvas.height = size;
  canvas.style.width = size * 2 + 'px';
  canvas.style.height = size + 'px';
  canvas.style.display = 'block';
  container.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * 2 * dpr;
  canvas.height = size * dpr;
  ctx.scale(dpr, dpr);

  const cx = radius + 15, cy = size / 2;
  const total = items.reduce((s, i) => s + i.pct, 0) || 100;
  let angle = -Math.PI / 2;

  // 画饼
  items.forEach((item, idx) => {
    const slice = (item.pct / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = colors[idx % colors.length];
    ctx.fill();
    angle += slice;
  });

  // 挖空
  ctx.beginPath();
  ctx.arc(cx, cy, hole, 0, Math.PI * 2);
  ctx.fillStyle = '#0a0c14';
  ctx.fill();

  // 图例
  const legendX = cx + radius + 20;
  items.forEach((item, idx) => {
    const y = 12 + idx * 28;
    ctx.fillStyle = colors[idx % colors.length];
    ctx.fillRect(legendX, y - 5, 10, 10);
    ctx.fillStyle = '#e8eaed';
    ctx.font = '12px -apple-system, PingFang SC, sans-serif';
    ctx.fillText(item.name, legendX + 15, y + 4);
    ctx.fillStyle = '#9ca3af';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.fillText(item.pct + '%', legendX + 15, y + 16);
  });
}

  document.getElementById('importError').style.display = 'none';
  _importParsedLots = [];

function parseImport() {
  const text = document.getElementById('importText').value.trim();
  const preview = document.getElementById('importPreview');
  const errorDiv = document.getElementById('importError');
  const tbody = document.getElementById('importPreviewBody');
  const assetType = document.getElementById('importAssetType').value;
  const isFund = assetType === 'fund';

  errorDiv.style.display = 'none';
  _importParsedLots = [];

  if (!text) {
    preview.style.display = 'none';
    showToast('请粘贴历史记录', 'warning');
    return;
  }

  const fmtHint = isFund ? '日期 金额 净值' : '日期 数量 单价';
  const field2Label = isFund ? '金额' : '数量';
  const field3Label = isFund ? '净值' : '单价';
  const lines = text.split('\n').filter(l => l.trim());
  const errors = [];
  const parsed = [];

  for (let i = 0; i < lines.length; i++) {
    const lineNo = i + 1;
    const parts = lines[i].trim().split(/\s+/);
    if (parts.length < 3) {
      errors.push(`第${lineNo}行: 格式错误，应为"${fmtHint}"（${parts.length}个字段）`);
      continue;
    }

    const tradedAt = parts[0];
    const val2 = parseFloat(parts[1]);
    const val3 = parseFloat(parts[2]);

    if (!/^\d{4}-\d{2}-\d{2}$/.test(tradedAt)) {
      errors.push(`第${lineNo}行: 日期格式不正确，请用 YYYY-MM-DD`);
      continue;
    }
    if (isNaN(val2) || val2 <= 0) {
      errors.push(`第${lineNo}行: ${field2Label}无效`);
      continue;
    }
    if (isNaN(val3) || val3 <= 0) {
      errors.push(`第${lineNo}行: ${field3Label}无效`);
      continue;
    }

    if (isFund) {
      const shares = val2 / val3;
      parsed.push({ traded_at: tradedAt, amount: val2, nav: val3, shares: shares, display: val2 });
    } else {
      const money = val2 * val3;
      parsed.push({ traded_at: tradedAt, amount: val2, nav: val3, shares: val2, display: money });
    }
  }

  if (!parsed.length) {
    preview.style.display = 'block';
    errorDiv.style.display = 'block';
    errorDiv.textContent = errors.length ? errors.join('\n') : '没有有效的记录可导入';
    tbody.innerHTML = '';
    document.getElementById('importCount').textContent = '0';
    document.getElementById('importTotalAmount').textContent = '0.00';
    document.getElementById('importTotalShares').textContent = '0.00';
    return;
  }

  _importParsedLots = parsed;

  const totalAmount = parsed.reduce((s, p) => s + p.display, 0);
  const totalShares = parsed.reduce((s, p) => s + p.shares, 0);

  tbody.innerHTML = parsed.map(p => {
    if (isFund) {
      return `<tr><td>${p.traded_at}</td><td>${formatMoney(p.amount)}</td><td>${p.nav.toFixed(4)}</td><td>${p.shares.toFixed(4)}</td></tr>`;
    } else {
      return `<tr><td>${p.traded_at}</td><td>${p.amount}</td><td>${formatMoney(p.nav)}</td><td>${formatMoney(p.display)}</td></tr>`;
    }
  }).join('');

  document.getElementById('importCount').textContent = parsed.length;
  document.getElementById('importTotalAmount').textContent = formatMoney(totalAmount);
  document.getElementById('importTotalShares').textContent = isFund ? totalShares.toFixed(4) : totalShares;

  if (errors.length) {
    errorDiv.style.display = 'block';
    errorDiv.textContent = errors.join('\n');
  } else {
    errorDiv.style.display = 'none';
  }

  preview.style.display = 'block';
}

async function confirmImport() {
  if (!_importParsedLots.length) {
    showToast('请先解析记录', 'warning');
    return;
  }

  const holdingId = document.getElementById('importHoldingId').value;
  const btn = document.getElementById('importConfirmBtn');
  btn.disabled = true;
  btn.textContent = '导入中…';

  try {
    const lots = _importParsedLots.map(p => ({
      traded_at: p.traded_at,
      amount: p.amount,
      nav: p.nav,
    }));
    const resp = await apiPost('/api/stocks/holdings/' + holdingId + '/import-lots', {
      lots: lots,
      note: '历史数据导入',
    });
    showToast(resp.message + `，新成本 ${resp.new_cost_price}`, 'success');
    hideImportForm();
    loadHoldings();
  } catch (err) {
    showToast('导入失败: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '确认导入';
  }
}

    if (bar && summaryRes.summary && !summaryRes.cold_start) {
      bar.innerHTML = '<div class="ai-insight-bar">' +
        '<div class="ai-label">AI 投资教练</div>' +
        '<div class="ai-headline">' + summaryRes.summary + '</div>' +
        '<div class="ai-meta">基于最近交易数据分析 &middot; <a href="review.html">查看完整报告 →</a></div>' +
      '</div>';
      bar.style.display = 'block';
    }
  } catch (e) {}
}

// ========================= 差价刷新（不重建DOM） =========================
async function refreshPrices() {
  try {
    const url = _currentPfId ? '/api/stocks/holdings/with-pnl?portfolio_id=' + _currentPfId : '/api/stocks/holdings/with-pnl';
    const data = await apiGet(url);
    const holdings = data.holdings;
    const summary = data.summary;

    if (!holdings || !holdings.length) return;

    // 更新 KPI 卡片
    const tv = document.getElementById('kpiTotalValue');
    if (tv) tv.textContent = formatMoney(summary.total_value);
    const tp = document.getElementById('kpiTotalPnl');
    if (tp) {
      tp.textContent = formatMoney(summary.total_pnl) + ' (' + formatPercent(summary.total_pnl_pct) + ')';
      tp.className = 'kpi-sub ' + (summary.total_pnl >= 0 ? 'up' : 'down');
    }
    const tdp = document.getElementById('kpiTodayPnl');
    if (tdp) {
      tdp.textContent = formatMoney(summary.today_pnl);
      tdp.className = 'kpi-value ' + (summary.today_pnl >= 0 ? 'up' : 'down');
    }

    // 更新每行持仓
    holdings.forEach(h => {
      const at = h.asset_type || 'stock';
      const row = document.querySelector('tr[data-hid="' + h.id + '"]');
      if (!row) return;

      const priceEl = row.querySelector('.price-cell');
      const mktValEl = row.querySelector('.mktval-cell');
      const changeEl = row.querySelector('.change-cell');
      const pnlEl = row.querySelector('.pnl-cell');

      if (priceEl) {
        const p = h.current_price;
        const prec = (at === 'fund' || at === 'etf') ? 4 : 2;
        priceEl.textContent = p != null ? Number(p).toFixed(prec) : '--';
      }
      if (mktValEl) mktValEl.textContent = formatMoney(h.market_value);
      if (changeEl) {
        const cp = h.change_pct;
        changeEl.textContent = cp != null ? (cp > 0 ? '+' : '') + cp.toFixed(2) + '%' : '--';
        changeEl.className = 'change-cell ' + ((cp || 0) >= 0 ? 'up' : 'down');
      }
      if (pnlEl) {
        pnlEl.textContent = formatMoney(h.pnl);
        pnlEl.className = 'pnl-cell ' + (h.pnl >= 0 ? 'up' : 'down');
      }
    });

    // 更新更新时间
    updateClock();
  } catch(e) { /* 忽略刷新错误 */ }
}

// 自动刷新：交易日 9-15 点每 20 秒，其余每 5 分钟
function autoRefreshLoop() {
  const now = new Date();
  const hour = now.getHours();
  const isWeekday = now.getDay() >= 1 && now.getDay() <= 5;
  const inMarketHours = isWeekday && hour >= 9 && hour < 15;
  refreshPrices();
  setTimeout(autoRefreshLoop, inMarketHours ? 20000 : 300000);
}

// ========================= 启动 =========================

loadPortfolios();
loadHoldings();
setTimeout(autoRefreshLoop, 10000);  // 10 秒后开始自动刷新
</script>
