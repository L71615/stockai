<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自选股 — StockAI</title>
<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockAI">
<link rel="manifest" href="./manifest.json">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(function(){})}</script>
<link rel="stylesheet" href="css/common.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="header"></div>
    <div class="content">

      <div class="card">
        <div class="card-header">
          <span>自选股列表</span>
          <button class="btn btn-primary btn-sm" onclick="showAddForm()">＋ 添加</button>
        </div>
        <div id="addForm" style="display:none;padding:12px 20px;border-bottom:1px solid var(--border);gap:8px;align-items:flex-end;flex-wrap:wrap;">
          <div>
            <label class="form-label">代码</label>
            <input class="form-input" id="addCode" placeholder="600519" style="width:120px;" oninput="onCodeInput()" onblur="autoLookup()">
          </div>
          <div>
            <label class="form-label">名称</label>
            <input class="form-input" id="addName" placeholder="贵州茅台" style="width:140px;">
          </div>
          <div>
            <label class="form-label">市场</label>
            <select class="form-input" id="addMarket" style="width:80px;">
              <option value="SH">沪</option><option value="SZ">深</option><option value="BJ">北</option>
            </select>
          </div>
          <div>
            <label class="form-label">类型</label>
            <select class="form-input" id="addType" style="width:80px;">
              <option value="">自动</option><option value="stock">股票</option><option value="etf">ETF</option><option value="fund">基金</option>
            </select>
          </div>
          <button class="btn btn-primary btn-sm" onclick="addStock()">确认</button>
          <button class="btn btn-outline btn-sm" onclick="hideAddForm()">取消</button>
        </div>
        <div id="watchlistTable"></div>
      </div>

    </div>
  </main>
</div>
<script src="js/common.js"></script>
<script>
initPage('watchlist', '自选股');

async function loadWatchlist() {
  const container = document.getElementById('watchlistTable');
  showLoading(container);
  try {
    const data = await apiGet('/api/stocks/watchlist');
    if (!data.length) {
      showEmpty(container, '还没有自选股，点击右上角添加');
      return;
    }

    // 批量获取行情
    const codes = data.map(s => s.stock_code);
    const markets = data.map(s => marketToApi(s.market));
    const assetTypes = data.map(s => s.asset_type || '');
    const quotes = await apiPost('/api/stocks/quotes', { codes, markets, asset_types: assetTypes });
    const quoteMap = {};
    quotes.forEach(q => { if (!q.error) quoteMap[q.code] = q; });

    const rows = data.map(s => {
      const q = quoteMap[s.stock_code];
      let price = '--', change = '--', pct = '--', high = '--', low = '--', vol = '--';
      let changeCls = '';
      if (q && q.price != null) {
        price = q.price.toFixed(4);
        if (q.change != null) {
          change = (q.change > 0 ? '+' : '') + q.change.toFixed(4);
          changeCls = q.change >= 0 ? 'up' : 'down';
        }
        if (q.change_pct != null) {
          pct = (q.change_pct > 0 ? '+' : '') + q.change_pct.toFixed(2) + '%';
        }
        high = q.high != null ? q.high.toFixed(2) : '--';
        low = q.low != null ? q.low.toFixed(2) : '--';
        vol = q.volume != null ? (q.volume / 10000).toFixed(0) + '万' : '--';
        // 基金用净值回退覆盖
        if (q.asset_type === 'fund' && q.nav != null) {
          vol = '估值';
        }
      }
      const at = s.asset_type || '';
      const typeTag = at === 'etf' ? '<span class="tag tag-sz">ETF</span>' : at === 'fund' ? '<span class="tag" style="background:rgba(59,130,246,0.15);color:#3b82f6;">基金</span>' : '';
      return `
        <tr>
          <td>
            <div class="stock-name">${s.stock_name} ${typeTag}</div>
            <div class="stock-code">${s.stock_code} ${getMarketTag(s.market)}</div>
          </td>
          <td class="font-mono">${price}</td>
          <td class="${changeCls}">${pct}</td>
          <td class="${changeCls}">${change}</td>
          <td>${vol}</td>
          <td>${high}</td>
          <td>${low}</td>
          <td>
            <button class="btn btn-primary btn-sm" onclick="quickAddHolding('${s.stock_code}','${s.stock_name}','${s.market}','${at}')">加入持仓</button>
            <button class="btn btn-outline btn-sm" onclick="removeStock(${s.id})">移除</button>
          </td>
        </tr>
      `;
    }).join('');

    container.innerHTML = `
      <table class="data-table">
        <thead>
          <tr><th>股票</th><th>现价</th><th>涨跌幅</th><th>涨跌额</th><th>成交量</th><th>最高</th><th>最低</th><th>操作</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="padding:8px 16px;font-size:11px;color:var(--text-muted);">
        实时行情 · 东方财富 · ${new Date().toLocaleString('zh-CN')}
      </div>
    `;
  } catch (err) { showError(container, err); }
}

async function addStock() {
  const stock_code = document.getElementById('addCode').value.trim();
  const stock_name = document.getElementById('addName').value.trim();
  const market = document.getElementById('addMarket').value;
  const asset_type = document.getElementById('addType').value;
  if (!stock_code || !stock_name) return showToast('请填写代码和名称', 'warning');
  await apiPost('/api/stocks/watchlist', { stock_code, stock_name, market, asset_type });
  hideAddForm();
  loadWatchlist();
}

async function removeStock(id) {
  showConfirm('移除自选？', async () => {
    await apiDelete('/api/stocks/watchlist/' + id);
    loadWatchlist();
  });
}

let _lookupTimer = null;
let _lookupCode = '';

async function autoLookup() {
  const code = document.getElementById('addCode').value.trim();
  if (!code || code === _lookupCode) return;
  _lookupCode = code;
  try {
    const data = await apiGet('/api/stocks/lookup/' + code);
    if (data && data.name) {
      document.getElementById('addName').value = data.name;
      document.getElementById('addMarket').value = codeToMarket(code);
      if (data.type) document.getElementById('addType').value = data.type;
    }
  } catch(e) { /* 查不到就算了 */ }
}

function onCodeInput() {
  _lookupCode = '';
  clearTimeout(_lookupTimer);
  _lookupTimer = setTimeout(autoLookup, 500);
}

function showAddForm() {
  document.getElementById('addForm').style.display = 'flex';
  setTimeout(() => { const el = document.getElementById('addCode'); if (el) el.focus(); }, 50);
}
function hideAddForm() {
  document.getElementById('addForm').style.display = 'none';
  document.getElementById('addCode').value = '';
  document.getElementById('addName').value = '';
  _lookupCode = '';
}

async function quickAddHolding(code, name, market, assetType) {
  if (assetType === 'fund') {
    const amount = await showPrompt(`添加基金 ${name}(${code}) 到持仓 — 请输入投入金额(元)：`, '10000');
    if (!amount || isNaN(amount) || parseFloat(amount) <= 0) return;
    try {
      const navData = await apiGet('/api/stocks/fund-nav/' + code);
      if (!navData || !navData.nav) { showToast('无法获取基金净值', 'error'); return; }
      const shares = Math.round(parseFloat(amount) / navData.nav * 100) / 100;
      await apiPost('/api/stocks/holdings', {
        stock_code: code, stock_name: name, market: market || 'SZ',
        asset_type: 'fund', quantity: Math.round(shares), shares: shares, cost_price: navData.nav,
      });
      showToast(`已添加 ${shares} 份，成本净值 ${navData.nav}`, 'success');
    } catch(e) { showToast('添加失败: ' + e.message, 'error'); }
  } else {
    const qty = await showPrompt(`添加 ${name}(${code}) 到持仓 — 请输入数量(股)：`, '100');
    if (!qty || isNaN(qty) || parseInt(qty) <= 0) return;
    const cost = await showPrompt('请输入成本价：', '10.00');
    if (!cost || isNaN(cost) || parseFloat(cost) <= 0) return;
    try {
      await apiPost('/api/stocks/holdings', {
        stock_code: code, stock_name: name, market: market || 'SH',
        asset_type: assetType || '', quantity: parseInt(qty), cost_price: parseFloat(cost),
      });
      showToast('已添加到持仓', 'success');
    } catch(e) { showToast('添加失败: ' + e.message, 'error'); }
  }
}

loadWatchlist();
</script>
</body>
</html>
