<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量化分析 — StockAI</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockAI">
<link rel="manifest" href="./manifest.json">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(function(){})}</script>
<link rel="stylesheet" href="css/common.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .q-kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .q-kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .q-kpi-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .q-kpi-value { font-size: 24px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .q-kpi-note { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .q-section { margin-bottom: 20px; }
  .q-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 768px) {
    .q-two-col { grid-template-columns: 1fr; }
    .q-kpi-grid { grid-template-columns: 1fr 1fr; }
    .q-kpi-value { font-size: 18px; }
    canvas { max-width: 100%; height: auto; }
  }
  .q-heat-cell { display: inline-block; width: 40px; height: 40px; line-height: 40px; text-align: center; font-size: 12px; font-family: 'JetBrains Mono', monospace; border-radius: 4px; margin: 2px; }
  .q-heat-label { font-size: 12px; color: var(--text-secondary); margin: 4px 0; }
  .q-heat-row { display: flex; align-items: center; }
  .q-backtest-result { padding: 16px; background: var(--bg-secondary); border-radius: var(--radius); margin-top: 12px; }
  .q-result-row { display: flex; gap: 24px; flex-wrap: wrap; }
  .q-result-item { text-align: center; }
  .q-result-val { font-size: 20px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .q-result-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .q-strat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .q-strat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .q-strat-name { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .q-strat-ret { font-size: 18px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .q-strat-info { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .q-mc-bars { display: flex; align-items: flex-end; gap: 2px; height: 120px; margin: 16px 0; }
  .q-mc-bar { flex: 1; background: var(--accent); opacity: 0.6; min-width: 4px; }
  .q-mc-bar.below { opacity: 1; background: #ef4444; }
  .chart-bar { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .chart-bar-label { width: 80px; font-size: 11px; color: var(--text-secondary); text-align: right; }
  .chart-bar-track { flex: 1; height: 14px; background: var(--bg-secondary); border-radius: 2px; overflow: hidden; }
  .chart-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="header"></div>
    <div class="content">

      <!-- ====== 个股透视 ====== -->
      <div class="card q-section">
        <div class="card-header">
          <span>🔍 个股透视</span>
          <span class="text-sm text-secondary" id="insightTitle"></span>
        </div>
        <div class="card-body" style="padding:12px 16px;">
          <!-- 选股栏 -->
          <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;">
            <div><label class="form-label">股票代码</label>
              <input type="text" class="form-input" id="insCode" placeholder="600519" style="width:100px;" onkeydown="if(event.key==='Enter')loadInsight()"></div>
            <div><label class="form-label">周期</label>
              <select class="form-input" id="insDays" style="width:100px;">
                <option value="60">60 天</option>
                <option value="120" selected>120 天</option>
                <option value="252">1 年</option>
                <option value="504">2 年</option>
              </select></div>
            <button class="btn btn-primary" onclick="loadInsight()">查看</button>
            <button class="btn btn-outline btn-sm" onclick="addToWatchlist()" title="加入自选股">+自选</button>
            <span id="insMeta" class="text-sm text-secondary" style="margin-left:8px;"></span>
          </div>
          <!-- K线图 -->
          <div style="position:relative;background:var(--bg-secondary);border-radius:6px;overflow:hidden;">
            <canvas id="insCanvas" width="900" height="340" style="width:100%;min-height:340px;display:block;"></canvas>
            <div id="insTooltip" style="display:none;position:absolute;top:4px;left:4px;background:rgba(0,0,0,0.85);color:#fff;font-size:11px;font-family:'JetBrains Mono',monospace;padding:6px 10px;border-radius:4px;pointer-events:none;z-index:2;"></div>
          </div>
          <!-- 成交量图 -->
          <div style="position:relative;">
            <canvas id="volCanvas" width="900" height="70" style="width:100%;height:70px;display:block;border-top:1px solid var(--border);"></canvas>
          </div>
          <!-- 指标面板 -->
          <div id="insSignals" style="display:flex;gap:16px;flex-wrap:wrap;padding:8px 0;font-size:12px;font-family:'JetBrains Mono',monospace;"></div>
          <!-- 因子行 -->
          <div id="insFactors" style="display:flex;gap:20px;flex-wrap:wrap;padding:6px 0;font-size:13px;border-top:1px solid var(--border-light);"></div>
        </div>
      </div>

      <!-- 风控 KPI -->
      <div class="q-kpi-grid" id="kpiGrid">
        <div class="q-kpi-card"><div class="q-kpi-label">Sharpe 比率</div><div class="q-kpi-value" id="kpSharpe">--</div><div class="q-kpi-note">风险调整后收益</div></div>
        <div class="q-kpi-card"><div class="q-kpi-label">最大回撤</div><div class="q-kpi-value" id="kpMaxDD">--</div><div class="q-kpi-note">历史最大跌幅</div></div>
        <div class="q-kpi-card"><div class="q-kpi-label">年化波动率</div><div class="q-kpi-value" id="kpVol">--</div><div class="q-kpi-note">价格波动程度</div></div>
        <div class="q-kpi-card"><div class="q-kpi-label">Beta vs 沪深300</div><div class="q-kpi-value" id="kpBeta">--</div><div class="q-kpi-note">市场敏感度</div></div>
      </div>

      <!-- 双列：相关性 + 回测 -->
      <div class="q-two-col q-section">
        <div class="card">
          <div class="card-header"><span>📈 持仓相关性</span><span id="corrCount" class="text-sm text-secondary"></span></div>
          <div class="card-body" id="corrBody"><div class="text-secondary">加载中…</div></div>
        </div>
        <div class="card">
          <div class="card-header"><span>🎯 DCA 回测</span></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">股票代码</label>
              <input type="text" class="form-input" id="btCode" value="510050" style="max-width:140px;">
            </div>
            <div class="form-group">
              <label class="form-label">策略</label>
              <select class="form-input" id="btFreq" style="max-width:200px;">
                <option value="monthly">每月定投</option>
                <option value="weekly">每周定投</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">每期金额 (元)</label>
              <input type="number" class="form-input" id="btAmount" value="2000" style="max-width:180px;">
            </div>
            <div class="form-group" style="display:flex;gap:8px;">
              <div><label class="form-label">起始日期</label><input type="date" class="form-input" id="btStart" value="2024-01-01"></div>
              <div><label class="form-label">结束日期</label><input type="date" class="form-input" id="btEnd" value="2026-01-01"></div>
            </div>
            <button class="btn btn-primary" onclick="runBacktest()" style="margin-top:8px;">计算回测</button>
            <div id="btResult"></div>
          </div>
        </div>
      </div>

      <!-- 策略对比 -->
      <div class="card q-section">
        <div class="card-header"><span>⚔️ 策略对比</span><span class="text-sm text-secondary">同只股票，不同策略的历史表现</span></div>
        <div class="card-body">
          <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;">
            <div><label class="form-label">股票代码</label><input type="text" class="form-input" id="scCode" value="510050" style="max-width:120px;"></div>
            <div><label class="form-label">月投金额</label><input type="number" class="form-input" id="scAmount" value="2000" style="max-width:120px;"></div>
            <div><label class="form-label">起始</label><input type="date" class="form-input" id="scStart" value="2024-01-01"></div>
            <div><label class="form-label">结束</label><input type="date" class="form-input" id="scEnd" value="2026-01-01"></div>
            <button class="btn btn-primary" onclick="runCompare()">对比</button>
          </div>
          <div class="q-strat-grid" id="stratGrid"><div class="text-secondary">点击"对比"查看结果</div></div>
        </div>
      </div>

      <!-- 蒙特卡洛 -->
      <div class="card q-section">
        <div class="card-header"><span>🎲 蒙特卡洛模拟</span><span class="text-sm text-secondary">基于历史波动率的未来价格路径模拟</span></div>
        <div class="card-body">
          <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;">
            <div><label class="form-label">股票代码</label><input type="text" class="form-input" id="mcCode" value="510050" style="max-width:120px;"></div>
            <div><label class="form-label">模拟天数</label><input type="number" class="form-input" id="mcDays" value="252" style="max-width:100px;"></div>
            <div><label class="form-label">模拟次数</label><input type="number" class="form-input" id="mcSims" value="500" style="max-width:100px;"></div>
            <button class="btn btn-primary" onclick="runMonteCarlo()">运行模拟</button>
          </div>
          <div id="mcResult"><div class="text-secondary">点击"运行模拟"查看结果</div></div>
        </div>
      </div>

      <!-- AI 策略对抗 -->
      <div class="card q-section">
        <div class="card-header"><span>⚔️ AI 实盘对抗</span><span class="text-sm text-secondary" id="duelRoundInfo"></span></div>
        <div class="card-body">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px;">
            <span style="font-size:11px;color:var(--text-muted);">参战:</span>
            <label style="font-size:12px;cursor:pointer;"><input type="checkbox" id="duelMiniMax" checked> MiniMax</label>
            <label style="font-size:12px;cursor:pointer;"><input type="checkbox" id="duelDeepSeek" checked> DeepSeek</label>
            <label style="font-size:12px;cursor:pointer;"><input type="checkbox" id="duelXiaomi"> 小米</label>
            <label style="font-size:12px;cursor:pointer;"><input type="checkbox" id="duelClaude"> Claude</label>
            <select class="form-input" id="duelDays" style="width:70px;">
              <option value="7">7天</option>
              <option value="30">30天</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="startAIDuel()" id="duelBtn">⚔️ 开局</button>
            <button class="btn btn-outline btn-sm" onclick="refreshDuel()" id="duelRefresh" style="display:none;">🔄 刷新</button>
            <button class="btn btn-outline btn-sm" onclick="rebalanceDuel()" id="duelRebalance" style="display:none;color:var(--accent-light);">📋 AI调仓</button>
            <span id="duelWindow" style="font-size:11px;color:var(--text-muted);"></span>
          </div>
          <div id="duelResult"><div class="text-secondary" style="font-size:12px;">勾选AI → 设周期 → 点"开局" — 每人随机分配一种投资风格（价值/成长/逆向/动量...），各选6只股，10万均分买入</div></div>
        </div>
      </div>

      <!-- AI 解读 -->
      <div class="card q-section" id="aiCard" style="display:none;">
        <div class="card-header"><span>🤖 AI 量化解读</span><span class="text-sm text-secondary">量化指标的白话解释</span></div>
        <div class="card-body" id="aiBody"></div>
      </div>

    </div>
  </main>
</div>
<script src="js/common.js"></script>
<script>
initPage('quant', '量化分析');

// ==================== 从 URL 参数自动加载 ====================
const _qp = new URLSearchParams(location.search);
const _urlCode = _qp.get('code');
const _urlName = _qp.get('name');

// ==================== 页面初始化 ====================
(async function init() {
  // 如果 URL 带了股票代码，自动填入并加载
  if (_urlCode) {
    document.getElementById('insCode').value = _urlCode;
    if (_urlName) {
      document.getElementById('insMeta').textContent = _urlName;
    }
    loadInsight();
  }

  try {
    const data = await apiGet('/api/quant/portfolio-risk');
    if (data.error) {
      document.getElementById('kpiGrid').innerHTML = '<div class="card"><div class="card-body text-secondary">' + data.error + ' — 请先在持仓页添加股票</div></div>';
      document.getElementById('corrBody').innerHTML = '<div class="text-secondary">暂无数据 — 需要至少2只持仓</div>';
      document.getElementById('corrCount').textContent = '';
      return;
    }
    renderRiskKPIs(data);
    renderCorrelation(data.correlation);
  } catch (e) {
    document.getElementById('kpiGrid').innerHTML = '<div class="card"><div class="card-body text-secondary">风控数据加载失败: ' + e.message + '</div></div>';
  }
})();

// ==================== 加自选 ====================
async function addToWatchlist() {
  const code = document.getElementById('insCode').value.trim();
  const name = document.getElementById('insMeta').textContent.trim();
  if (!code) return alert('请先输入或选择股票代码');
  try {
    const res = await apiPost('/api/screener/watchlist/add', {
      code, name: name || '', reason: '量化分析添加',
    });
    alert(res.message);
  } catch (e) {
    alert('添加失败: ' + e.message);
  }
}

// ==================== 风控 KPI ====================
function renderRiskKPIs(data) {
  document.getElementById('kpSharpe').textContent = data.sharpe != null ? data.sharpe.toFixed(2) : '--';
  document.getElementById('kpMaxDD').textContent = data.max_drawdown != null ? (data.max_drawdown * 100).toFixed(1) + '%' : '--';
  document.getElementById('kpVol').textContent = data.volatility != null ? (data.volatility * 100).toFixed(1) + '%' : '--';
  document.getElementById('kpBeta').textContent = data.beta != null ? data.beta.toFixed(2) : '--';

  if (data.max_drawdown < -0.20) document.getElementById('kpMaxDD').style.color = '#ef4444';
  if (data.beta > 1.5) document.getElementById('kpBeta').style.color = '#f59e0b';
}

// ==================== 相关性热力图 ====================
function renderCorrelation(corr) {
  var body = document.getElementById('corrBody');
  var countEl = document.getElementById('corrCount');

  if (!corr || !corr.stocks || corr.stocks.length < 2) {
    body.innerHTML = '<div class="text-secondary">需要 ≥2 只有效数据的持仓</div>';
    countEl.textContent = corr && corr.stocks ? '(' + corr.stocks.length + ' 只)' : '';
    return;
  }

  countEl.textContent = '(' + corr.stocks.length + ' 只)';
  var stocks = corr.stocks;
  var matrix = corr.matrix;

  var html = '<div style="overflow-x:auto;">';
  // Header row
  html += '<div class="q-heat-row"><span style="width:60px;flex-shrink:0;"></span>';
  stocks.forEach(function(s) { html += '<span style="width:40px;text-align:center;font-size:10px;color:var(--text-muted);">' + s + '</span>'; });
  html += '</div>';

  // Data rows
  for (var i = 0; i < stocks.length; i++) {
    html += '<div class="q-heat-row"><span style="width:60px;flex-shrink:0;font-size:11px;color:var(--text-secondary);">' + stocks[i] + '</span>';
    for (var j = 0; j < stocks.length; j++) {
      var v = matrix[i][j];
      var bg = v == null ? 'transparent' : 'rgba(' + (v > 0 ? '34,197,94' : '239,68,68') + ',' + Math.abs(v) * 0.6 + ')';
      html += '<span class="q-heat-cell" style="background:' + bg + ';color:#fff;">' + (v != null ? v.toFixed(1) : '--') + '</span>';
    }
    html += '</div>';
  }
  html += '</div>';
  body.innerHTML = html;
}

// ==================== DCA 回测 ====================
async function runBacktest() {
  var body = document.getElementById('btResult');
  body.innerHTML = '<div class="text-secondary">计算中…</div>';

  try {
    var data = await apiPost('/api/quant/backtest', {
      code: document.getElementById('btCode').value,
      amount: parseFloat(document.getElementById('btAmount').value) || 2000,
      freq: document.getElementById('btFreq').value,
      start_date: document.getElementById('btStart').value,
      end_date: document.getElementById('btEnd').value || ''
    });

    var dcaRet = data.total_return * 100;
    var lumpRet = data.lump_sum_return * 100;
    var better = dcaRet > lumpRet ? '定投胜出' : '一次性买入胜出';

    body.innerHTML = '<div class="q-backtest-result">' +
      '<div class="q-result-row">' +
        '<div class="q-result-item"><div class="q-result-val">¥' + formatNum(data.total_invested) + '</div><div class="q-result-label">总投入</div></div>' +
        '<div class="q-result-item"><div class="q-result-val">¥' + formatNum(data.final_value) + '</div><div class="q-result-label">终值</div></div>' +
        '<div class="q-result-item"><div class="q-result-val" style="color:' + (dcaRet >= 0 ? '#22c55e' : '#ef4444') + '">' + dcaRet.toFixed(1) + '%</div><div class="q-result-label">定投总回报</div></div>' +
        '<div class="q-result-item"><div class="q-result-val">' + (data.annual_return * 100).toFixed(1) + '%</div><div class="q-result-label">年化收益</div></div>' +
        '<div class="q-result-item"><div class="q-result-val" style="color:var(--text-secondary)">' + lumpRet.toFixed(1) + '%</div><div class="q-result-label">一次性买入</div></div>' +
        '<div class="q-result-item"><div class="q-result-val" style="font-size:14px;">' + better + '</div><div class="q-result-label">结论</div></div>' +
      '</div>' +
      '<div style="margin-top:12px;font-size:12px;color:var(--text-muted);">共 ' + data.num_purchases + ' 次买入 · 终价 ¥' + data.final_price.toFixed(2) + '</div>' +
      '</div>';
  } catch (e) {
    body.innerHTML = '<div class="text-error">回测失败: ' + e.message + '</div>';
  }
}

// ==================== 策略对比 ====================
async function runCompare() {
  var grid = document.getElementById('stratGrid');
  grid.innerHTML = '<div class="text-secondary">计算中…</div>';

  try {
    var data = await apiPost('/api/quant/compare', {
      code: document.getElementById('scCode').value,
      amount: parseFloat(document.getElementById('scAmount').value) || 2000,
      start_date: document.getElementById('scStart').value,
      end_date: document.getElementById('scEnd').value || ''
    });

    var names = { dca: '定期定额', value_avg: '价值平均', fixed_shares: '固定股数', dip_buy: '下跌加仓' };
    var colors = { dca: '#3b82f6', value_avg: '#22c55e', fixed_shares: '#f59e0b', dip_buy: '#a855f7' };

    var items = [];
    for (var key in data.strategies) {
      var s = data.strategies[key];
      if (s.error) continue;
      items.push({ key: key, ret: s.return, invested: s.total_invested, final: s.final_value });
    }
    items.sort(function(a, b) { return b.ret - a.ret; });

    var maxRet = Math.max.apply(null, items.map(function(i) { return Math.abs(i.ret); }));

    grid.innerHTML = items.map(function(item) {
      var retPct = item.ret * 100;
      var barWidth = maxRet > 0 ? Math.abs(item.ret) / maxRet * 100 : 0;
      return '<div class="q-strat-card">' +
        '<div class="q-strat-name" style="color:' + (colors[item.key] || '#fff') + '">' + (names[item.key] || item.key) + '</div>' +
        '<div class="q-strat-ret" style="color:' + (retPct >= 0 ? '#22c55e' : '#ef4444') + '">' + retPct.toFixed(1) + '%</div>' +
        '<div class="chart-bar"><div class="chart-bar-track"><div class="chart-bar-fill" style="width:' + barWidth + '%;background:' + (colors[item.key] || '#fff') + '"></div></div></div>' +
        '<div class="q-strat-info">投入 ¥' + formatNum(item.invested) + ' · 终值 ¥' + formatNum(item.final) + '</div>' +
        '</div>';
    }).join('');
  } catch (e) {
    grid.innerHTML = '<div class="text-error">策略对比失败: ' + e.message + '</div>';
  }
}

// ==================== 蒙特卡洛 ====================
async function runMonteCarlo() {
  var body = document.getElementById('mcResult');
  body.innerHTML = '<div class="text-secondary">模拟中…</div>';

  try {
    var data = await apiPost('/api/quant/monte-carlo', {
      code: document.getElementById('mcCode').value,
      days: parseInt(document.getElementById('mcDays').value) || 252,
      sims: parseInt(document.getElementById('mcSims').value) || 500
    });

    // 柱状图：把价格分桶
    var paths = data.simulations_data || [];
    var allFinals = [];
    paths.forEach(function(p) { allFinals.push(p[p.length - 1]); });
    allFinals.sort(function(a, b) { return a - b; });

    var nBins = 15;
    if (!allFinals.length) { body.innerHTML = '<div class="text-secondary">无模拟数据</div>'; return; }

    var minP = allFinals[0], maxP = allFinals[allFinals.length - 1];
    var binW = (maxP - minP) / nBins || 0.01;
    var bins = new Array(nBins).fill(0);
    allFinals.forEach(function(p) {
      var idx = Math.min(Math.floor((p - minP) / binW), nBins - 1);
      bins[idx]++;
    });
    var maxBin = Math.max.apply(null, bins);

    var html = '<div class="q-result-row" style="margin-bottom:12px;">';
    html += '<div class="q-result-item"><div class="q-result-val">' + data.current_price.toFixed(2) + '</div><div class="q-result-label">当前价格</div></div>';
    html += '<div class="q-result-item"><div class="q-result-val">' + data.mean_final.toFixed(2) + '</div><div class="q-result-label">模拟均值</div></div>';
    html += '<div class="q-result-item"><div class="q-result-val" style="color:#ef4444">' + (data.prob_loss * 100).toFixed(1) + '%</div><div class="q-result-label">亏损概率</div></div>';
    html += '<div class="q-result-item"><div class="q-result-val" style="color:#ef4444">' + (data.prob_loss_15pct * 100).toFixed(1) + '%</div><div class="q-result-label">亏损>15%概率</div></div>';
    html += '</div>';

    // Histogram
    html += '<div class="q-mc-bars">';
    bins.forEach(function(count, i) {
      var h = count / maxBin * 100;
      var price = minP + binW * (i + 0.5);
      html += '<div class="q-mc-bar' + (price < data.current_price ? ' below' : '') + '" style="height:' + h + '%;" title="¥' + price.toFixed(1) + ': ' + count + '次"></div>';
    });
    html += '</div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);"><span>¥' + minP.toFixed(1) + '</span><span>终价分布 (共' + data.simulations + '次模拟)</span><span>¥' + maxP.toFixed(1) + '</span></div>';

    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = '<div class="text-error">模拟失败: ' + e.message + '</div>';
  }
}

function setupCanvas(canvas, W, H) {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  var dw = rect.width || W;
  canvas.width = dw * dpr;
  canvas.height = H * dpr;
  canvas.style.width = dw + 'px';
  canvas.style.height = H + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, dw, H);
  ctx.fillStyle = '#141722'; ctx.fillRect(0, 0, dw, H);
  return { ctx: ctx, W: dw, H: H };
}

function drawKline(canvas, kl, ind) {
  var r = setupCanvas(canvas, 900, 340);
  var ctx = r.ctx, W = r.W, H = r.H;

  const dates = kl.dates, opens = kl.opens, closes = kl.closes, highs = kl.highs, lows = kl.lows;
  const n = dates.length;
  if (n < 2) return;

  // 布局参数
  const pad = { top: 30, bottom: 30, left: 60, right: 20 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const candleW = Math.max(1, Math.min(8, chartW / n * 0.7));
  const gap = chartW / n - candleW;

  // 价格范围
  let minP = Infinity, maxP = -Infinity;
  for (let i = 0; i < n; i++) {
    if (highs[i] > maxP) maxP = highs[i];
    if (lows[i] < minP) minP = lows[i];
  }
  // 加 MA 值到范围
  const mas = ind && ind.MA ? ind.MA : {};
  for (const k of ['MA5','MA10','MA20','MA60']) {
    if (mas[k] != null) { if (mas[k] > maxP) maxP = mas[k]; if (mas[k] < minP) minP = mas[k]; }
  }
  const priceRange = maxP - minP || 1;
  minP -= priceRange * 0.02; maxP += priceRange * 0.02;

  const x = (i) => pad.left + i * (chartW / n);
  const y = (p) => pad.top + chartH * (1 - (p - minP) / (maxP - minP));

  // 背景网格
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 5; i++) {
    const gy = pad.top + chartH * i / 4;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(W - pad.right, gy); ctx.stroke();
    const price = maxP - (maxP - minP) * i / 4;
    ctx.fillStyle = '#6b7280'; ctx.font = '10px JetBrains Mono';
    ctx.textAlign = 'right'; ctx.fillText(price.toFixed(2), pad.left - 4, gy + 3);
  }

  // 蜡烛图
  for (let i = 0; i < n; i++) {
    const cx = x(i) + gap / 2;
    const isUp = closes[i] >= opens[i];
    const color = isUp ? '#ef4444' : '#22c55e';
    ctx.strokeStyle = color;
    ctx.fillStyle = isUp ? '#ef4444' : 'transparent';
    // 影线
    ctx.beginPath();
    ctx.moveTo(cx + candleW / 2, y(highs[i]));
    ctx.lineTo(cx + candleW / 2, y(lows[i]));
    ctx.stroke();
    // 实体
    const bodyTop = y(isUp ? closes[i] : opens[i]);
    const bodyBot = y(isUp ? opens[i] : closes[i]);
    const bodyH = Math.max(1, bodyBot - bodyTop);
    ctx.fillRect(cx, bodyTop, candleW, bodyH);
    if (!isUp) ctx.strokeRect(cx, bodyTop, candleW, bodyH);
  }

  // MA 线
  const maColors = { MA5: '#fbbf24', MA10: '#f59e0b', MA20: '#c084fc', MA60: '#60a5fa' };
  const maData = {};
  if (ind && ind.MA) {
    // 均线从 kline 计算：用 closes 实时算
    for (const [label, period] of [['MA5',5],['MA10',10],['MA20',20],['MA60',60]]) {
      const vals = [];
      for (let i = 0; i < n; i++) {
        if (i < period - 1) { vals.push(null); continue; }
        let sum = 0;
        for (let j = i - period + 1; j <= i; j++) sum += closes[j];
        vals.push(sum / period);
      }
      maData[label] = vals;
    }
  }
  for (const [label, color] of Object.entries(maColors)) {
    const vals = maData[label];
    if (!vals) continue;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < n; i++) {
      if (vals[i] === null) { started = false; continue; }
      const px = x(i) + candleW / 2 + gap / 2;
      const py = y(vals[i]);
      if (!started) { ctx.moveTo(px, py); started = true; }
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  // 图例
  let legendX = pad.left;
  for (const [label, color] of Object.entries(maColors)) {
    ctx.fillStyle = color; ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'left';
    ctx.fillText(label, legendX, 16);
    legendX += ctx.measureText(label).width + 14;
  }

  // 日期标签
  ctx.fillStyle = '#6b7280'; ctx.font = '9px JetBrains Mono'; ctx.textAlign = 'center';
  const dateStep = Math.max(1, Math.floor(n / 6));
  for (let i = 0; i < n; i += dateStep) {
    ctx.fillText(dates[i].slice(5), x(i) + candleW / 2 + gap / 2, H - 6);
  }

  // 鼠标悬浮
  canvas.onmousemove = function(e) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = W / rect.width;
    var mx = (e.clientX - rect.left) * scaleX;
    const i = Math.floor((mx - pad.left) / (chartW / n));
    if (i < 0 || i >= n) { document.getElementById('insTooltip').style.display = 'none'; return; }
    const tip = document.getElementById('insTooltip');
    tip.style.display = 'block';
    tip.style.left = Math.min(e.clientX - rect.left + 10, rect.width - 180) + 'px';
    tip.style.top = '4px';
    const o = opens[i], c = closes[i], h = highs[i], l = lows[i];
    const chg = ((c - o) / o * 100).toFixed(2);
    tip.innerHTML = dates[i] +
      '<br>开 ' + o.toFixed(2) + ' 高 ' + h.toFixed(2) +
      '<br>收 ' + c.toFixed(2) + ' 低 ' + l.toFixed(2) +
      '<br>涨跌 <span style="color:' + (c >= o ? '#ef4444' : '#22c55e') + '">' + (chg >= 0 ? '+' : '') + chg + '%</span>';
  };
  canvas.onmouseleave = function() { document.getElementById('insTooltip').style.display = 'none'; };
}

function drawVolume(canvas, kl, hoverIdx) {
  var r = setupCanvas(canvas, 900, 70);
  var ctx = r.ctx, W = r.W, H = r.H;

  var dates = kl.dates, opens = kl.opens, closes = kl.closes, volumes = kl.volumes;
  if (!volumes || !volumes.length) {
    ctx.fillStyle = '#6b7280'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('ETF/指数无成交量明细', W/2, H/2 + 4);
    canvas._volLayout = null;
    return;
  }

  // Filter valid numbers
  var validVols = [];
  for (var vi = 0; vi < volumes.length; vi++) {
    var vv = volumes[vi];
    if (vv != null && !isNaN(vv) && vv > 0) validVols.push(vv);
  }
  if (!validVols.length) {
    ctx.fillStyle = '#6b7280'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('成交量数据不可用', W/2, H/2 + 4);
    canvas._volLayout = null;
    return;
  }

  var maxV = Math.max.apply(null, validVols);
  var pad = { top: 4, bottom: 14, left: 60, right: 20 };
  var chartW = W - pad.left - pad.right;
  var chartH = H - pad.top - pad.bottom;
  var n = dates.length;
  var barW = Math.max(2, chartW / n * 0.7);
  var gap = chartW / n - barW;

  for (var i = 0; i < n; i++) {
    var v = volumes[i];
    if (v == null || isNaN(v) || v <= 0) continue;
    var bx = pad.left + i * (chartW / n) + gap / 2;
    var barH = Math.max(1, (v / maxV) * chartH);
    var isUp = closes[i] >= opens[i];
    var isHover = (i === hoverIdx);
    ctx.fillStyle = isHover
      ? (isUp ? '#ef4444' : '#22c55e')
      : (isUp ? 'rgba(239,68,68,0.65)' : 'rgba(34,197,94,0.55)');
    ctx.fillRect(bx, pad.top + chartH - barH, barW, barH);
    if (isHover) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
      ctx.strokeRect(bx, pad.top + chartH - barH, barW, barH);
    }
  }

  // Labels
  ctx.fillStyle = '#6b7280'; ctx.font = '9px JetBrains Mono'; ctx.textAlign = 'right';
  ctx.fillText('VOL', pad.left - 4, pad.top + 9);
  ctx.textAlign = 'left';
  var maxLabel = maxV >= 1e8 ? (maxV/1e8).toFixed(1)+'亿' : maxV >= 1e4 ? (maxV/1e4).toFixed(0)+'万' : maxV.toFixed(0);
  ctx.fillText(maxLabel, pad.left + 2, pad.top + 9);

  // 存储布局参数供 hover 使用
  canvas._volLayout = { pad: pad, chartW: chartW, chartH: chartH, n: n, maxV: maxV, barW: barW, gap: gap, volumes: volumes, opens: opens, closes: closes, dates: dates, W: W };
}

// 成交量 hover（在 drawKline 调用后绑定一次）
(function setupVolHover() {
  const volCanvas = document.getElementById('volCanvas');
  if (!volCanvas || volCanvas._hoverSetup) return;
  volCanvas._hoverSetup = true;

  const volTooltip = document.createElement('div');
  volTooltip.id = 'volTooltip';
  volTooltip.style.cssText = 'display:none;position:absolute;background:rgba(0,0,0,0.88);color:#fff;font-size:11px;font-family:JetBrains Mono,monospace;padding:5px 8px;border-radius:4px;pointer-events:none;z-index:3;white-space:nowrap;';
  volCanvas.parentElement.appendChild(volTooltip);

  volCanvas.addEventListener('mousemove', function(e) {
    var L = volCanvas._volLayout;
    if (!L) { volTooltip.style.display = 'none'; return; }
    var rect = volCanvas.getBoundingClientRect();
    var scaleX = L.W / rect.width;
    var mx = (e.clientX - rect.left) * scaleX;
    var i = Math.floor((mx - L.pad.left) / (L.chartW / L.n));

    if (i < 0 || i >= L.n || !L.volumes[i]) {
      volTooltip.style.display = 'none';
      drawVolume(volCanvas, { dates: L.dates, opens: L.opens, closes: L.closes, volumes: L.volumes }, -1);
      return;
    }

    drawVolume(volCanvas, { dates: L.dates, opens: L.opens, closes: L.closes, volumes: L.volumes }, i);

    var rawV = L.volumes[i] / 100;
    var txt = rawV >= 1e6 ? (rawV/1e6).toFixed(2)+'亿手' :
              rawV >= 1e4 ? (rawV/1e4).toFixed(1)+'万手' :
              rawV.toFixed(0)+'手';
    var isUp = L.closes[i] >= L.opens[i];
    volTooltip.innerHTML = '<b>' + L.dates[i] + '</b>  VOL <b style="color:' + (isUp ? '#ef4444' : '#22c55e') + '">' + txt + '</b>';
    volTooltip.style.display = 'block';
    volTooltip.style.left = Math.min(e.clientX - rect.left + 14, rect.width - 160) + 'px';
    volTooltip.style.top = '2px';
  });

  volCanvas.addEventListener('mouseleave', function() {
    volTooltip.style.display = 'none';
    var L = volCanvas._volLayout;
    if (L) drawVolume(volCanvas, { dates: L.dates, opens: L.opens, closes: L.closes, volumes: L.volumes }, -1);
  });
})();

          '<td style="text-align:right;">' + pk.price.toFixed(2) + '</td>' +
          '<td style="text-align:right;">' + pk.quantity + '</td>' +
          '<td style="text-align:right;">' + formatMoney(pk.invested) + '</td></tr>';
      }
      html += '</table>';
    }
    html += '</div>';
  }
  document.getElementById('duelResult').innerHTML = html || '<div class="text-secondary">所有AI未能选出有效股票</div>';
}

function renderDuelStatus(resp) {
  // 交易窗口提示
  var winText = resp.trading_window ? '🟢 交易窗口开放中' : '⏸ 非交易窗口';
  var winClr = resp.trading_window ? 'var(--green)' : 'var(--text-muted)';
  document.getElementById('duelWindow').innerHTML = '<span style="color:' + winClr + ';">' + winText + '</span>';

  var html = '<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;">' + (resp.started_at || '--') + ' · ' + resp.period_days + '天 · 调仓窗口: 11:00-11:30 / 14:30-15:00</div>';
  var players = resp.players || [];
  for (var i = 0; i < players.length; i++) {
    var p = players[i];
    var totalPnl = p.current_value - p.total_invested;
    var totalPnlPct = p.total_invested > 0 ? (totalPnl / p.total_invested * 100) : 0;
    var pnlClr = totalPnl >= 0 ? 'var(--red)' : 'var(--green)';
    var isWinner = p.winner;

    html += '<div style="background:' + (isWinner ? 'rgba(124,138,224,0.08)' : 'var(--bg-secondary)') +
      ';border:1px solid ' + (isWinner ? 'var(--accent)' : 'var(--border)') +
      ';border-radius:8px;padding:10px;margin-bottom:6px;">';
    html += '<div style="display:flex;align-items:center;gap:6px;">';
    html += '<b>' + p.provider.toUpperCase() + '</b>';
    if (isWinner) html += '<span style="background:var(--accent);color:#fff;font-size:10px;padding:1px 7px;border-radius:10px;">🏆</span>';
    html += '<span style="margin-left:auto;font-family:JetBrains Mono,monospace;font-size:12px;">投' + formatMoney(p.total_invested) + '</span>';
    html += '<span style="font-family:JetBrains Mono,monospace;font-size:12px;">→' + formatMoney(p.current_value) + '</span>';
    html += '<span style="font-family:JetBrains Mono,monospace;font-size:13px;color:' + pnlClr + ';font-weight:600;">' + (totalPnl >= 0 ? '+' : '') + formatMoney(totalPnl) + '</span>';
    html += '</div>';

    if (p.picks.length) {
      html += '<table style="width:100%;font-size:10px;margin-top:4px;border-collapse:collapse;">';
      for (var j = 0; j < p.picks.length; j++) {
        var pk = p.picks[j];
        var clr = pk.pnl >= 0 ? 'var(--red)' : 'var(--green)';
        html += '<tr style="border-top:1px solid var(--border-light);">';
        html += '<td><b>' + pk.code + '</b></td>';
        html += '<td style="text-align:right;">' + pk.buy_price.toFixed(2) + '</td>';
        html += '<td style="text-align:right;">→' + (pk.current_price||0).toFixed(2) + '</td>';
        html += '<td style="text-align:right;color:' + clr + ';">' + (pk.pnl_pct>=0?'+':'') + pk.pnl_pct.toFixed(1) + '%</td>';
        if (pk.alert) html += '<td style="color:' + (pk.alert.indexOf('止损')>=0?'#ef4444':'#22c55e') + ';font-size:10px;">' + pk.alert + '</td>';
        html += '</tr>';
      }
      html += '</table>';
    }
    html += '</div>';
  }
  document.getElementById('duelResult').innerHTML = html || '<div class="text-secondary">无数据</div>';
}
</script>
</body>
</html>
