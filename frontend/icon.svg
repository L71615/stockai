<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f35"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="512" height="512" rx="70"/>
  <rect x="96" y="128" width="320" height="256" rx="12" fill="#1e2340" stroke="#2a3055" stroke-width="3"/>
  <!-- candle 1 (red/up) -->
  <rect x="120" y="170" width="22" height="65" rx="3" fill="#e74c3c"/>
  <line x1="131" y1="155" x2="131" y2="170" stroke="#e74c3c" stroke-width="2"/>
  <line x1="131" y1="235" x2="131" y2="248" stroke="#e74c3c" stroke-width="2"/>
  <!-- candle 2 (green/down) -->
  <rect x="160" y="200" width="22" height="50" rx="3" fill="#27ae60"/>
  <line x1="171" y1="190" x2="171" y2="200" stroke="#27ae60" stroke-width="2"/>
  <line x1="171" y1="250" x2="171" y2="275" stroke="#27ae60" stroke-width="2"/>
  <!-- candle 3 (red/up) -->
  <rect x="200" y="190" width="22" height="70" rx="3" fill="#e74c3c"/>
  <line x1="211" y1="170" x2="211" y2="190" stroke="#e74c3c" stroke-width="2"/>
  <line x1="211" y1="260" x2="211" y2="280" stroke="#e74c3c" stroke-width="2"/>
  <!-- candle 4 (red/up) -->
  <rect x="240" y="160" width="22" height="80" rx="3" fill="#e74c3c"/>
  <line x1="251" y1="140" x2="251" y2="160" stroke="#e74c3c" stroke-width="2"/>
  <line x1="251" y1="240" x2="251" y2="258" stroke="#e74c3c" stroke-width="2"/>
  <!-- trend line -->
  <polyline points="131,195 171,225 211,225 251,200" fill="none" stroke="#5c6bc0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- moving average line -->
  <polyline points="131,210 171,240 211,240 251,220" fill="none" stroke="#f39c12" stroke-width="2.5" stroke-dasharray="8,4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- bottom label bar -->
  <rect x="96" y="400" width="320" height="48" rx="0 0 12 12" fill="#5c6bc0"/>
  <text x="256" y="431" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="#fff">StockAI</text>
  <!-- top sparkle dots -->
  <circle cx="386" cy="158" r="5" fill="#5c6bc0" opacity="0.6"/>
  <circle cx="370" cy="180" r="3" fill="#5c6bc0" opacity="0.4"/>
  <circle cx="398" cy="175" r="4" fill="#5c6bc0" opacity="0.5"/>
</svg>
