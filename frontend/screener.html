<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI选股 — StockAI</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="css/common.css">
<style>
  .scr-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .scr-layout { grid-template-columns: 1fr; } }
  .scr-status { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-secondary); border-radius: var(--radius); font-size: 13px; }
  .scr-status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .scr-status-dot.running { background: #22c55e; animation: pulse 1s infinite; }
  .scr-status-dot.idle { background: var(--text-muted); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .scr-progress { height: 4px; background: var(--bg-secondary); border-radius: 2px; overflow: hidden; margin: 8px 0; }
  .scr-progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 2px; }
  .scr-candidate-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .scr-candidate-table th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border); color: var(--text-secondary); font-weight: 500; font-size: 12px; position: sticky; top: 0; background: var(--bg-card); }
  .scr-candidate-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
  .scr-candidate-table tr:hover td { background: var(--bg-secondary); }
  .scr-score-bar { height: 6px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; width: 60px; display: inline-block; vertical-align: middle; }
  .scr-score-fill { height: 100%; border-radius: 3px; }
  .scr-tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; margin-right: 4px; }
  .scr-tag-green { background: #dcfce7; color: #166534; }
  .scr-tag-red { background: #fef2f2; color: #991b1b; }
  .scr-tag-blue { background: #dbeafe; color: #1e40af; }
  .scr-btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
  .scr-btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-card); cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .scr-btn:hover { border-color: var(--accent); color: var(--accent); }
  .scr-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .scr-btn.primary:hover { opacity: 0.9; }
  .scr-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .scr-backtest-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
  .scr-bt-card { padding: 12px; background: var(--bg-secondary); border-radius: var(--radius); border: 1px solid var(--border); }
  .scr-bt-name { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .scr-bt-val { font-size: 18px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .scr-bt-val.pos { color: #16a34a; }
  .scr-bt-val.neg { color: #dc2626; }
  .scr-ai-pick { padding: 10px; margin: 6px 0; background: var(--bg-secondary); border-left: 3px solid var(--accent); border-radius: 0 var(--radius) var(--radius) 0; }
  .scr-ai-reason { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .scr-watch-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .scr-watch-item:last-child { border-bottom: none; }
  .scr-empty { text-align: center; padding: 40px; color: var(--text-muted); }
  .scr-briefing { padding: 16px; background: var(--bg-secondary); border-radius: var(--radius); line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
  .scr-section-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="header"></div>
    <div class="content">

      <!-- ═══════════ 顶部操作栏 ═══════════ -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-header"><span>🤖 AI 选股工作台</span></div>
        <div class="card-body">
          <div class="scr-btn-group">
            <button class="scr-btn primary" onclick="startScreener()" id="btnRun">🚀 启动全市场扫描</button>
            <button class="scr-btn" onclick="loadResults()" id="btnResults">📊 查看扫描结果</button>
            <button class="scr-btn" onclick="aiScreen()" id="btnAI">🧠 AI 二次筛选</button>
            <button class="scr-btn" onclick="runPipeline()" id="btnPipeline">⚡ 一条龙（选股→回测→盯盘）</button>
          </div>
          <div class="scr-status" id="statusBar">
            <span class="scr-status-dot idle" id="statusDot"></span>
            <span id="statusText">就绪 — 点击"启动扫描"开始</span>
          </div>
          <div class="scr-progress" id="progressWrap" style="display:none;">
            <div class="scr-progress-bar" id="progressBar" style="width:0%"></div>
          </div>
          <div style="margin-top:8px;font-size:12px;color:var(--text-muted);">
            💡 <b>工作流</b>：全市场扫描 → 查看候选池 → AI二次筛选 → 回测验证 → 加入盯盘 → AI每日简报
          </div>
        </div>
      </div>

      <div class="scr-layout">

        <!-- ═══════════ 左栏：候选池 + 回测 ═══════════ -->
        <div>

          <!-- 选股结果 -->
          <div class="card" style="margin-bottom:16px;">
            <div class="card-header">
              <span>📈 多因子候选池</span>
              <span class="text-sm text-secondary" id="poolInfo"></span>
            </div>
            <div class="card-body" style="max-height:500px;overflow-y:auto;padding:0;" id="candidatePool">
              <div class="scr-empty">尚未扫描，点击"启动全市场扫描"</div>
            </div>
          </div>

          <!-- 回测结果 -->
          <div class="card" style="margin-bottom:16px;">
            <div class="card-header"><span>📐 策略回测</span></div>
            <div class="card-body" id="backtestArea">
              <div class="scr-empty">选择候选股票后自动回测</div>
            </div>
          </div>

        </div>

        <!-- ═══════════ 右栏：AI 筛股 + 盯盘 ═══════════ -->
        <div>

          <!-- AI 二次筛选 -->
          <div class="card" style="margin-bottom:16px;">
            <div class="card-header"><span>🧠 AI 精选推荐</span></div>
            <div class="card-body" id="aiPicks">
              <div class="scr-empty">运行 AI 筛选后显示推荐</div>
            </div>
          </div>

          <!-- 盯盘列表 -->
          <div class="card" style="margin-bottom:16px;">
            <div class="card-header">
              <span>👁️ 盯盘列表</span>
              <button class="scr-btn" style="margin-left:auto;font-size:12px;padding:4px 8px;" onclick="refreshWatchlist()">刷新</button>
            </div>
            <div class="card-body" style="padding:0;" id="watchlist">
              <div class="scr-empty">盯盘列表为空</div>
            </div>
          </div>

          <!-- 盯盘简报 -->
          <div class="card">
            <div class="card-header">
              <span>📋 盯盘简报</span>
              <button class="scr-btn" style="margin-left:auto;font-size:12px;padding:4px 8px;" onclick="loadBriefing()">生成简报</button>
            </div>
            <div class="card-body" id="briefingArea">
              <div class="scr-empty">点击"生成简报"获取 AI 盯盘分析</div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>
</div>

<script src="js/common.js"></script>
<script>
// ═══════════════════════════════════════════════
// 全局状态
// ═══════════════════════════════════════════════
let candidates = [];
let btResults = {};
let pollTimer = null;

// ═══════════════════════════════════════════════
// 1. 启动全市场扫描
// ═══════════════════════════════════════════════
async function startScreener() {
  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  btn.textContent = '⏳ 扫描中...';
  setStatus('running', '全市场扫描启动中...');
  document.getElementById('progressWrap').style.display = 'block';

  try {
    await apiPost('/api/screener/run', { stock_count: 500, max_workers: 8, industry_neutral: true });
    pollStatus();
  } catch(e) {
    setStatus('idle', '扫描启动失败: ' + e.message);
    btn.disabled = false;
    btn.textContent = '🚀 启动全市场扫描';
  }
}

function pollStatus() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const s = await apiGet('/api/screener/status');
      document.getElementById('progressBar').style.width = s.percent + '%';
      setStatus(s.running ? 'running' : 'idle',
        s.running ? `扫描中 ${s.progress}/${s.total} (${s.percent}%)` :
        s.has_result ? '扫描完成 ✅ — 点击"查看扫描结果"' : '就绪');

      if (!s.running) {
        clearInterval(pollTimer);
        pollTimer = null;
        document.getElementById('btnRun').disabled = false;
        document.getElementById('btnRun').textContent = '🔄 重新扫描';
        if (s.has_result) loadResults();
      }
    } catch(e) { /* ignore */ }
  }, 2000);
}

// ═══════════════════════════════════════════════
// 2. 查看扫描结果
// ═══════════════════════════════════════════════
async function loadResults() {
  try {
    const data = await apiGet('/api/screener/results?limit=30');
    candidates = data.candidates || [];
    document.getElementById('poolInfo').textContent =
      `${candidates.length} 只候选 · 市场状态: ${data.market_state || 'N/A'} · 扫描 ${data.scanned}/${data.total_stocks}`;
    renderCandidates(candidates);
  } catch(e) {
    document.getElementById('candidatePool').innerHTML = `<div class="scr-empty">加载失败: ${e.message}</div>`;
  }
}

function renderCandidates(list) {
  if (!list.length) {
    document.getElementById('candidatePool').innerHTML = '<div class="scr-empty">暂无候选股票</div>';
    return;
  }

  let html = '<table class="scr-candidate-table"><thead><tr>' +
    '<th>排名</th><th>代码</th><th>名称</th><th>行业</th><th>得分</th><th>主要因子</th><th>操作</th></tr></thead><tbody>';

  list.forEach((c, i) => {
    const scoreFill = Math.max(0, Math.min(100, (c.score + 3) / 6 * 100));
    const scoreColor = c.score > 1 ? '#16a34a' : c.score > 0 ? '#f59e0b' : '#dc2626';
    const tf = (c.top_factors || []).slice(0, 3);
    const factorTags = tf.map(f => {
      const cls = f.contribution > 0 ? 'scr-tag-green' : 'scr-tag-red';
      return `<span class="scr-tag ${cls}">${f.factor}</span>`;
    }).join('');

    html += `<tr>
      <td>${i + 1}</td>
      <td><strong>${c.code}</strong></td>
      <td>${c.name || ''}</td>
      <td>${c.industry || 'N/A'}</td>
      <td>
        <div class="scr-score-bar"><div class="scr-score-fill" style="width:${scoreFill}%;background:${scoreColor};"></div></div>
        ${c.score.toFixed(2)}
      </td>
      <td>${factorTags}</td>
      <td>
        <button class="scr-btn" style="font-size:11px;padding:2px 6px;" onclick="backtestSingle('${c.code}')">回测</button>
        <button class="scr-btn" style="font-size:11px;padding:2px 6px;" onclick="addWatch('${c.code}','${c.name||''}',${c.score})">+盯盘</button>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('candidatePool').innerHTML = html;
}

// ═══════════════════════════════════════════════
// 3. AI 二次筛选
// ═══════════════════════════════════════════════
async function aiScreen() {
  const btn = document.getElementById('btnAI');
  btn.disabled = true;
  btn.textContent = '⏳ AI 筛选中...';
  document.getElementById('aiPicks').innerHTML = '<div class="scr-empty">⏳ AI 正在分析候选池...</div>';

  try {
    const data = await apiPost('/api/screener/ai-screen', {
      provider: getAIConfig().provider || 'deepseek',
      top_n: 10,
    });

    let html = `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">${data.summary || ''}</div>`;
    (data.picks || []).forEach((p, i) => {
      html += `<div class="scr-ai-pick">
        <strong>${i + 1}. ${p.code} ${p.name || ''}</strong>
        ${p.score !== undefined ? ` <span style="color:var(--text-muted);font-size:12px;">得分:${p.score}</span>` : ''}
        <div class="scr-ai-reason">💡 ${p.reason || ''}</div>
        <button class="scr-btn" style="font-size:11px;padding:2px 8px;margin-top:4px;" onclick="backtestSingle('${p.code}')">策略回测</button>
        <button class="scr-btn" style="font-size:11px;padding:2px 8px;margin-top:4px;" onclick="addWatch('${p.code}','${p.name||''}',${p.score||0},'${(p.reason||'').replace(/'/g,"\\'")}')">+盯盘</button>
      </div>`;
    });

    document.getElementById('aiPicks').innerHTML = html || '<div class="scr-empty">AI 未返回推荐</div>';
  } catch(e) {
    document.getElementById('aiPicks').innerHTML = `<div class="scr-empty">AI 筛选失败: ${e.message}<br>请确认已在设置页配置 AI Key</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '🧠 AI 二次筛选';
  }
}

// ═══════════════════════════════════════════════
// 4. 策略回测
// ═══════════════════════════════════════════════
async function backtestSingle(code) {
  const area = document.getElementById('backtestArea');
  area.innerHTML = `<div class="scr-empty">⏳ 正在回测 ${code}...</div>`;

  try {
    const results = await apiPost('/api/screener/backtest/batch', {
      codes: [code],
      strategies: ['ma_cross', 'macd', 'rsi', 'momentum'],
    });

    let html = `<div class="scr-section-title">📐 ${code} 策略回测结果</div><div class="scr-backtest-grid">`;
    (results.results || []).forEach(r => {
      if (r.error) {
        html += `<div class="scr-bt-card"><div class="scr-bt-name">${r.strategy}</div><div style="color:#dc2626;font-size:12px;">${r.error}</div></div>`;
      } else {
        const retCls = r.total_return >= 0 ? 'pos' : 'neg';
        html += `<div class="scr-bt-card">
          <div class="scr-bt-name">${r.strategy}</div>
          <div class="scr-bt-val ${retCls}">${(r.total_return * 100).toFixed(2)}%</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">
            Sharpe ${r.sharpe?.toFixed(2)||'N/A'} | 胜率 ${((r.win_rate||0)*100).toFixed(0)}%<br>
            最大回撤 ${((r.max_drawdown||0)*100).toFixed(1)}% | ${r.num_trades}笔
          </div>
        </div>`;
      }
    });
    html += '</div>';
    area.innerHTML = html;
  } catch(e) {
    area.innerHTML = `<div class="scr-empty">回测失败: ${e.message}</div>`;
  }
}

async function backtestSelected() {
  if (!candidates.length) return alert('请先加载候选池');
  const top5 = candidates.slice(0, 5);
  await backtestSingleList(top5.map(c => c.code));
}

async function backtestSingleList(codes) {
  const area = document.getElementById('backtestArea');
  area.innerHTML = `<div class="scr-empty">⏳ 正在批量回测 ${codes.length} 只股票...</div>`;

  try {
    const results = await apiPost('/api/screener/backtest/batch', {
      codes: codes,
      strategies: ['ma_cross', 'macd', 'rsi'],
    });

    const best = results.summary?.best_strategy_per_stock || {};
    let html = '<div class="scr-section-title">📐 批量回测汇总</div>';
    html += '<table class="scr-candidate-table"><thead><tr><th>代码</th><th>最佳策略</th><th>收益率</th><th>Sharpe</th><th>回撤</th><th>胜率</th><th>操作</th></tr></thead><tbody>';

    const grouped = {};
    (results.results || []).forEach(r => {
      if (r.error) return;
      if (!grouped[r.code]) grouped[r.code] = [];
      grouped[r.code].push(r);
    });

    Object.entries(grouped).forEach(([code, stratResults]) => {
      const bestStrat = best[code] || stratResults[0]?.strategy;
      const bestR = stratResults.find(s => s.strategy === bestStrat) || stratResults[0];
      if (!bestR) return;
      const retCls = bestR.total_return >= 0 ? 'pos' : 'neg';
      html += `<tr>
        <td><strong>${code}</strong></td>
        <td>${bestR.strategy}</td>
        <td class="scr-bt-val ${retCls}" style="font-size:14px;">${(bestR.total_return*100).toFixed(2)}%</td>
        <td>${bestR.sharpe?.toFixed(2)||'N/A'}</td>
        <td>${((bestR.max_drawdown||0)*100).toFixed(1)}%</td>
        <td>${((bestR.win_rate||0)*100).toFixed(0)}%</td>
        <td><button class="scr-btn" style="font-size:11px;padding:2px 6px;" onclick="addWatch('${code}','',null,'回测${bestR.strategy} Sharpe=${bestR.sharpe?.toFixed(2)}')">+盯盘</button></td>
      </tr>`;
    });

    html += '</tbody></table>';
    area.innerHTML = html;
  } catch(e) {
    area.innerHTML = `<div class="scr-empty">回测失败: ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════
// 5. 盯盘管理
// ═══════════════════════════════════════════════
async function addWatch(code, name, score, reason) {
  try {
    const res = await apiPost('/api/screener/watchlist/add', {
      code, name: name || '', reason: reason || '', score: score || null,
      backtest_strategy: '', backtest_sharpe: null,
    });
    alert(res.message);
    refreshWatchlist();
  } catch(e) {
    alert('添加失败: ' + e.message);
  }
}

async function removeWatch(code) {
  if (!confirm(`确定将 ${code} 从盯盘移除？`)) return;
  try {
    await apiDelete('/api/screener/watchlist/' + code);
    refreshWatchlist();
  } catch(e) {
    alert('移除失败: ' + e.message);
  }
}

async function refreshWatchlist() {
  try {
    const list = await apiGet('/api/screener/watchlist');
    if (!list.length) {
      document.getElementById('watchlist').innerHTML = '<div class="scr-empty">盯盘列表为空</div>';
      return;
    }

    let html = '';
    list.forEach(item => {
      html += `<div class="scr-watch-item">
        <div>
          <strong>${item.stock_code}</strong> ${item.stock_name || ''}
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">
            ${item.reason || '无备注'} ${item.score ? `· 得分:${item.score}` : ''}
            ${item.backtest_strategy ? `· 策略:${item.backtest_strategy}` : ''}
          </div>
        </div>
        <button class="scr-btn" style="font-size:11px;padding:2px 8px;" onclick="removeWatch('${item.stock_code}')">移除</button>
      </div>`;
    });

    document.getElementById('watchlist').innerHTML = html;
  } catch(e) {
    document.getElementById('watchlist').innerHTML = `<div class="scr-empty">加载失败: ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════
// 6. 盯盘简报
// ═══════════════════════════════════════════════
async function loadBriefing() {
  const area = document.getElementById('briefingArea');
  area.innerHTML = '<div class="scr-empty">⏳ AI 正在生成盯盘简报...</div>';

  try {
    const data = await apiPost('/api/screener/watchlist/briefing', {
      provider: getAIConfig().provider || 'deepseek',
    });
    area.innerHTML = `<div class="scr-briefing">${data.briefing || '简报为空'}</div>`;
  } catch(e) {
    area.innerHTML = `<div class="scr-empty">简报生成失败: ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════
// 7. 一条龙
// ═══════════════════════════════════════════════
async function runPipeline() {
  const btn = document.getElementById('btnPipeline');
  btn.disabled = true;
  btn.textContent = '⏳ 执行中...';

  try {
    const data = await apiPost('/api/screener/pipeline', {
      provider: getAIConfig().provider || 'deepseek',
      top_n: 8,
    });

    // 显示 AI 结果
    const aiResult = data.step1_ai_screen;
    if (aiResult?.picks) {
      let html = `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px;">${aiResult.summary || ''}</div>`;
      aiResult.picks.forEach((p, i) => {
        html += `<div class="scr-ai-pick">
          <strong>${i+1}. ${p.code} ${p.name||''}</strong>
          <div class="scr-ai-reason">💡 ${p.reason||''}</div>
        </div>`;
      });
      document.getElementById('aiPicks').innerHTML = html;
    }

    // 显示回测结果
    if (data.step2_backtest?.results) {
      const best = data.step2_backtest.summary?.best_strategy_per_stock || {};
      let html = '<div class="scr-section-title">📐 回测结果</div><table class="scr-candidate-table"><thead><tr><th>代码</th><th>策略</th><th>收益</th><th>Sharpe</th></tr></thead><tbody>';
      const seen = new Set();
      (data.step2_backtest.results || []).forEach(r => {
        if (r.error || seen.has(r.code)) return;
        seen.add(r.code);
        const bestStrat = best[r.code];
        if (bestStrat && r.strategy !== bestStrat) return;
        const cls = r.total_return >= 0 ? 'pos' : 'neg';
        html += `<tr><td><strong>${r.code}</strong></td><td>${r.strategy}</td><td class="scr-bt-val ${cls}" style="font-size:13px;">${(r.total_return*100).toFixed(2)}%</td><td>${r.sharpe?.toFixed(2)||'N/A'}</td></tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('backtestArea').innerHTML = html;
    }

    // 显示盯盘简报
    if (data.briefing) {
      document.getElementById('briefingArea').innerHTML = `<div class="scr-briefing">${data.briefing}</div>`;
    }

    // 刷新盯盘列表
    refreshWatchlist();

    alert(`一条龙完成！已添加 ${data.step3_watchlist?.length || 0} 只股票到盯盘列表`);

  } catch(e) {
    alert('执行失败: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ 一条龙（选股→回测→盯盘）';
  }
}

// ═══════════════════════════════════════════════
// 辅助
// ═══════════════════════════════════════════════
function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'scr-status-dot ' + (state === 'running' ? 'running' : 'idle');
  document.getElementById('statusText').textContent = text;
}

// 初始化
initPage('screener', 'AI选股');
requireAuth();
refreshWatchlist();
loadResults();
</script>
