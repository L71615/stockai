<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易记录 — StockAI</title>
<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockAI">
<link rel="manifest" href="./manifest.json">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(function(){})}</script>
<link rel="stylesheet" href="css/common.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="header"></div>
    <div class="content">

      <div class="kpi-row" id="statsRow" style="grid-template-columns: repeat(3, 1fr);"></div>

      <div class="card">
        <div class="card-header">
          <span>交易明细</span>
          <div style="display:flex;gap:8px;align-items:center;">
            <select class="form-input" id="reviewPeriod" style="width:80px;">
              <option value="month">本月</option>
              <option value="quarter">本季</option>
              <option value="year">本年</option>
              <option value="all">全部</option>
            </select>
            <button class="btn btn-outline btn-sm" onclick="generateReview()">🤖 AI 复盘</button>
            <button class="btn btn-primary btn-sm" onclick="showAddTx()">＋ 添加记录</button>
          </div>
        </div>
        <div id="txAddForm" style="display:none;padding:12px 20px;border-bottom:1px solid var(--border);gap:8px;align-items:flex-end;flex-wrap:wrap;">
          <div><label class="form-label">代码</label><input class="form-input" id="txCode" placeholder="600519" style="width:100px;"></div>
          <div><label class="form-label">名称</label><input class="form-input" id="txName" placeholder="茅台" style="width:100px;"></div>
          <div><label class="form-label">类型</label><select class="form-input" id="txType" style="width:70px;"><option value="">自动</option><option value="stock">股票</option><option value="etf">ETF</option><option value="fund">基金</option></select></div>
          <div><label class="form-label">方向</label><select class="form-input" id="txDir" style="width:70px;"><option value="buy">买入</option><option value="sell">卖出</option></select></div>
          <div><label class="form-label">价格</label><input class="form-input" id="txPrice" placeholder="0.00" style="width:80px;" type="number" step="0.01"></div>
          <div><label class="form-label">数量</label><input class="form-input" id="txQty" placeholder="100" style="width:70px;" type="number"></div>
          <div><label class="form-label">日期</label><input class="form-input" id="txDate" type="date" value="${new Date().toISOString().slice(0,10)}" style="width:130px;"></div>
          <button class="btn btn-primary btn-sm" onclick="addTx()">确认</button>
          <button class="btn btn-outline btn-sm" onclick="hideAddTx()">取消</button>
        </div>
        <div id="txEditForm" style="display:none;padding:12px 20px;border-bottom:1px solid var(--accent);background:var(--bg-secondary);gap:8px;align-items:flex-end;flex-wrap:wrap;">
          <input type="hidden" id="editTxId">
          <div><label class="form-label">日期</label><input class="form-input" id="editTxDate" type="date" style="width:130px;"></div>
          <div><label class="form-label">价格</label><input class="form-input" id="editTxPrice" type="number" step="0.01" style="width:80px;"></div>
          <div><label class="form-label">数量</label><input class="form-input" id="editTxQty" type="number" step="0.0001" style="width:80px;"></div>
          <div><label class="form-label">备注</label><input class="form-input" id="editTxNote" placeholder="备注" style="width:150px;"></div>
          <button class="btn btn-primary btn-sm" onclick="saveEditTx()">保存</button>
          <button class="btn btn-outline btn-sm" onclick="hideEditTx()">取消</button>
        </div>
        <div id="txTable"></div>
      </div>

      <div class="card" id="reviewCard" style="display:none;">
        <div class="card-header">
          <span>📈 AI 复盘报告</span>
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('reviewCard').style.display='none'">关闭</button>
        </div>
        <div class="card-body" id="reviewContent" style="font-size:14px;line-height:1.8;white-space:pre-wrap;"></div>
      </div>

    </div>
  </main>
</div>
<script src="js/common.js"></script>
<script>
initPage('transactions', '📝 交易记录');

async function loadTransactions() {
  const stats = document.getElementById('statsRow');
  const container = document.getElementById('txTable');
  showLoading(container);
  try {
    const data = await apiGet('/api/stocks/transactions');
    if (!data.length) {
      stats.innerHTML = '';
      showEmpty(container, '还没有交易记录');
      return;
    }

    const totalTrades = data.length;
    const buyTrades = data.filter(t => t.direction === 'buy');
    const sellTrades = data.filter(t => t.direction === 'sell');
    const totalBuy = buyTrades.reduce((s, t) => s + t.amount, 0);
    const totalSell = sellTrades.reduce((s, t) => s + t.amount, 0);

    stats.innerHTML = `
      <div class="kpi-card">
        <div class="kpi-label">累计交易次数</div>
        <div class="kpi-value">${totalTrades}</div>
        <div class="kpi-sub">${buyTrades.length} 买 ${sellTrades.length} 卖</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">总买入金额</div>
        <div class="kpi-value">${formatMoney(totalBuy)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">总卖出金额</div>
        <div class="kpi-value">${formatMoney(totalSell)}</div>
      </div>
    `;

    const rows = data.map(t => `
      <tr>
        <td class="text-secondary">${t.traded_at}</td>
        <td><span class="stock-name">${t.stock_name}</span> <span class="stock-code">${t.stock_code}</span></td>
        <td>
          <span class="tag" style="background:${t.direction==='buy'?'var(--green-bg)':'var(--red-bg)'};color:${t.direction==='buy'?'var(--green)':'var(--red)'};">
            ${t.direction === 'buy' ? '买入' : '卖出'}
          </span>
        </td>
        <td>${formatMoney(t.price)}</td>
        <td>${t.quantity}</td>
        <td>${formatMoney(t.amount)}</td>
        <td class="text-secondary">${t.note || ''}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="showEditTx(${t.id},'${t.traded_at.slice(0,10)}',${t.price},${t.quantity},'${(t.note||'').replace(/'/g,"\\'")}')" title="编辑" style="padding:2px 6px;font-size:11px;">✏️</button>
          <button class="btn btn-outline btn-sm" onclick="deleteTx(${t.id},'${t.stock_code}')" title="删除" style="padding:2px 6px;font-size:11px;color:var(--red);">🗑️</button>
        </td>
      </tr>
    `).join('');

    container.innerHTML = `
      <table class="data-table">
        <thead>
          <tr><th>日期</th><th>股票</th><th>方向</th><th>价格</th><th>数量(股)</th><th>金额</th><th>备注</th><th>操作</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (err) { showError(container, err); }
}

async function addTx() {
  const stock_code = document.getElementById('txCode').value.trim();
  const stock_name = document.getElementById('txName').value.trim();
  const asset_type = document.getElementById('txType').value;
  const direction = document.getElementById('txDir').value;
  const price = parseFloat(document.getElementById('txPrice').value);
  const quantity = parseInt(document.getElementById('txQty').value);
  const traded_at = document.getElementById('txDate').value + ' 09:30';
  if (!stock_code || !price || !quantity) return showToast('请填写完整', 'warning');
  await apiPost('/api/stocks/transactions', { stock_code, stock_name, asset_type, direction, price, quantity, traded_at });
  hideAddTx();
  loadTransactions();
}

function showAddTx() { document.getElementById('txAddForm').style.display = 'flex'; }
function hideAddTx() {
  document.getElementById('txAddForm').style.display = 'none';
  ['txCode','txName','txPrice','txQty'].forEach(id => document.getElementById(id).value = '');
}

function showEditTx(id, date, price, qty, note) {
  document.getElementById('txAddForm').style.display = 'none';
  document.getElementById('txEditForm').style.display = 'flex';
  document.getElementById('editTxId').value = id;
  document.getElementById('editTxDate').value = date;
  document.getElementById('editTxPrice').value = price;
  document.getElementById('editTxQty').value = qty;
  document.getElementById('editTxNote').value = note;
  document.getElementById('txEditForm').scrollIntoView({ behavior: 'smooth' });
}

function hideEditTx() {
  document.getElementById('txEditForm').style.display = 'none';
}

async function saveEditTx() {
  const id = document.getElementById('editTxId').value;
  const traded_at = document.getElementById('editTxDate').value;
  const price = parseFloat(document.getElementById('editTxPrice').value);
  const quantity = parseFloat(document.getElementById('editTxQty').value);
  const note = document.getElementById('editTxNote').value;

  if (isNaN(price) || price <= 0) return showToast('价格无效', 'warning');
  if (isNaN(quantity) || quantity <= 0) return showToast('数量无效', 'warning');

  try {
    const resp = await apiPut('/api/stocks/transactions/' + id, { traded_at, price, quantity, note });
    let msg = resp.message;
    if (resp.holding_updated) {
      msg += '，持仓成本已更新为 ' + resp.holding.cost_price;
    }
    showToast(msg, 'success');
    hideEditTx();
    loadTransactions();
  } catch (err) {
    showToast('编辑失败: ' + err.message, 'error');
  }
}

async function deleteTx(id, stockCode) {
  await showConfirm('确定删除 ' + stockCode + ' 的这条交易记录吗？', async () => {
    try {
      const resp = await apiDelete('/api/stocks/transactions/' + id);
      let msg = resp.message;
      if (resp.holding_updated) {
        msg += '，持仓成本已更新为 ' + resp.holding.cost_price;
      }
      showToast(msg, 'success');
      loadTransactions();
    } catch (err) {
      showToast('删除失败: ' + err.message, 'error');
    }
  });
}

async function generateReview() {
  const cfg = getAIConfig();
  if (!cfg.apiKey) { showToast('请先在设置页配置 AI 供应商和 API Key', 'warning'); return; }

  const card = document.getElementById('reviewCard');
  const content = document.getElementById('reviewContent');
  card.style.display = '';
  content.textContent = '正在生成复盘报告…';
  card.scrollIntoView({ behavior: 'smooth' });

  try {
    const data = await apiPost('/api/stocks/review', {
      provider: cfg.provider,
      apiKey: cfg.apiKey,
      model: cfg.model,
      period: document.getElementById('reviewPeriod').value,
    });
    content.textContent = data.review || '（未生成报告）';
  } catch(err) {
    content.textContent = '生成失败: ' + err.message;
  }
}

loadTransactions();
</script>
</body>
</html>
