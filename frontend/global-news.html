<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球资讯 — StockAI</title>
<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockAI">
<link rel="manifest" href="./manifest.json">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(function(){})}</script>
<link rel="stylesheet" href="css/common.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --map-ocean: #0f172a;
    --map-selected: #3b82f6;
    --map-glow: rgba(59,130,246,0.6);
  }
  .map-wrap {
    display: flex;
    gap: 20px;
    height: calc(100vh - 170px);
    min-height: 500px;
  }
  .map-svg-wrap {
    flex: 1;
    min-width: 0;
    background: var(--map-ocean);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .map-svg-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  /* 城市脉冲点 */
  .city-dot {
    fill: var(--map-selected);
    cursor: pointer;
    transition: fill 0.2s;
  }
  .city-dot:hover {
    fill: #60a5fa;
  }
  .city-dot.selected {
    fill: #f59e0b;
  }
  .city-pulse {
    fill: var(--map-selected);
    opacity: 0.5;
    pointer-events: none;
  }
  .city-dot.selected + .city-pulse {
    fill: #f59e0b;
  }
  /* 连接线 */
  .conn-line {
    fill: none;
    stroke: url(#lineGrad);
    stroke-width: 0.3;
    stroke-dasharray: 1 2;
    opacity: 0.35;
    pointer-events: none;
  }
  /* 悬浮提示 */
  .map-tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(15,23,42,0.95);
    border: 1px solid var(--map-selected);
    border-radius: 6px;
    padding: 6px 12px;
    color: #e2e8f0;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.15s;
    box-shadow: 0 0 12px rgba(0,0,0,0.5);
  }
  .map-tooltip.show { opacity: 1; }
  /* 右侧新闻面板 */
  .news-panel {
    width: 370px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .news-panel-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-card);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .news-panel-body {
    flex: 1;
    overflow-y: auto;
  }
  .news-card {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background 0.15s;
  }
  .news-card:hover { background: rgba(148,163,184,0.05); }
  .news-card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 4px;
  }
  .news-card-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 12px;
  }
  .news-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text-muted);
    text-align: center;
  }
  .news-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .news-empty p { font-size: 13px; line-height: 1.8; }
  /* 底部快捷栏 */
  .quick-bar {
    display: flex;
    gap: 6px;
    padding: 10px 0;
    flex-wrap: wrap;
  }
  .quick-chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    border: 1px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }
  .quick-chip:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border); }
  .quick-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* 图例提示 */
  .map-legend {
    position: absolute;
    bottom: 12px;
    left: 14px;
    font-size: 10px;
    color: var(--map-text, #64748b);
    display: flex;
    gap: 14px;
    pointer-events: none;
  }
  .map-legend span { display: flex; align-items: center; gap: 4px; }
  .map-legend .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--map-selected); }
  .map-legend .dot.pulse { animation: legendPulse 1.5s infinite; }
  @keyframes legendPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  /* 响应式 */
  @media (max-width: 900px) {
    .map-wrap { flex-direction: column; height: auto; }
    .map-svg-wrap { height: 350px; }
    .news-panel { width: 100%; max-height: 400px; }
  }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <main class="main">
    <div class="header"></div>
    <div class="content">

      <div class="quick-bar" id="quickBar"></div>

      <div class="map-wrap">
        <div class="map-svg-wrap" id="mapWrap">
          <div class="map-tooltip" id="mapTooltip"></div>
          <div class="map-legend">
            <span><span class="dot pulse"></span> 金融中心</span>
            <span style="color:#334155;">- - -</span><span> 资本流动</span>
          </div>
          <svg id="worldMap" viewBox="0 0 198 100" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
        <div class="news-panel">
          <div class="news-panel-head" id="newsHead">🌍 全球财经资讯</div>
          <div class="news-panel-body" id="newsBody">
            <div class="news-empty">
              <div class="news-empty-icon">🗺️</div>
              <p>点击地图上的亮点<br>查看当地财经新闻</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="js/common.js"></script>
<script>
// ==================== 全球金融中心城市 ====================
// viewBox = 198 x 100, equirectangular projection
// x = (lng + 180) * (198 / 360), y = (90 - lat) * (100 / 180)
const CITIES = [
  { id:"us", name:"纽约",   country:"美国",     lat:40.7,  lng:-74.0  },
  { id:"uk", name:"伦敦",   country:"英国",     lat:51.5,  lng:-0.1   },
  { id:"cn", name:"上海",   country:"中国",     lat:31.2,  lng:121.5  },
  { id:"jp", name:"东京",   country:"日本",     lat:35.7,  lng:139.8  },
  { id:"hk", name:"香港",   country:"中国香港", lat:22.3,  lng:114.2  },
  { id:"sg", name:"新加坡", country:"新加坡",   lat:1.3,   lng:103.8  },
  { id:"de", name:"法兰克福",country:"德国",     lat:50.1,  lng:8.7    },
  { id:"ae", name:"迪拜",   country:"阿联酋",   lat:25.3,  lng:55.3   },
  { id:"in", name:"孟买",   country:"印度",     lat:19.1,  lng:72.9   },
  { id:"au", name:"悉尼",   country:"澳大利亚", lat:-33.9, lng:151.2  },
  { id:"br", name:"圣保罗", country:"巴西",     lat:-23.5, lng:-46.6  },
  { id:"ca", name:"多伦多", country:"加拿大",   lat:43.7,  lng:-79.4  },
  { id:"kr", name:"首尔",   country:"韩国",     lat:37.6,  lng:127.0  },
  { id:"ru", name:"莫斯科", country:"俄罗斯",   lat:55.8,  lng:37.6   },
  { id:"sa", name:"利雅得", country:"沙特",     lat:24.7,  lng:46.7   },
  { id:"za", name:"约翰内斯堡",country:"南非",   lat:-26.2, lng:28.0   },
];

function project(lat, lng) {
  return {
    x: (lng + 180) * (198 / 360),
    y: (90 - lat) * (100 / 180)
  };
}

// 连接线对 (起点→终点)
const CONNECTIONS = [
  ["us","uk"], ["us","cn"], ["uk","de"], ["uk","hk"],
  ["cn","jp"], ["cn","hk"], ["cn","sg"], ["hk","sg"],
  ["jp","kr"], ["ae","in"], ["ae","sg"], ["us","br"],
  ["us","ca"], ["uk","ae"], ["in","sg"], ["au","sg"],
];

function curvePath(s, e) {
  const mx = (s.x + e.x) / 2;
  const my = Math.min(s.y, e.y) - 4;
  return `M${s.x} ${s.y} Q${mx} ${my} ${e.x} ${e.y}`;
}

// ==================== 渲染 SVG ====================
const svg = document.getElementById('worldMap');
const tooltip = document.getElementById('mapTooltip');
const mapWrap = document.getElementById('mapWrap');

// 背景 — 深海色
const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
bg.setAttribute('width','198'); bg.setAttribute('height','100');
bg.setAttribute('fill','#0f172a');
svg.appendChild(bg);

// 虚线经纬网 (装饰)
for (let lat = 80; lat >= -80; lat -= 40) {
  const y = (90 - lat) * (100 / 180);
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1','0'); line.setAttribute('y1',String(y));
  line.setAttribute('x2','198'); line.setAttribute('y2',String(y));
  line.setAttribute('stroke','#1e293b'); line.setAttribute('stroke-width','0.15');
  svg.appendChild(line);
}
for (let lng = -160; lng <= 160; lng += 40) {
  const x = (lng + 180) * (198 / 360);
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',String(x)); line.setAttribute('y1','0');
  line.setAttribute('x2',String(x)); line.setAttribute('y2','100');
  line.setAttribute('stroke','#1e293b'); line.setAttribute('stroke-width','0.15');
  svg.appendChild(line);
}

// 渐变遮罩定义
const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');

// 边缘渐变遮罩
const mask = document.createElementNS('http://www.w3.org/2000/svg','mask');
mask.setAttribute('id','edgeFade');
const maskRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
maskRect.setAttribute('width','198'); maskRect.setAttribute('height','100');
maskRect.setAttribute('fill','url(#fadeGrad)');
mask.appendChild(maskRect);

const fadeGrad = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
fadeGrad.setAttribute('id','fadeGrad');
fadeGrad.setAttribute('x1','0'); fadeGrad.setAttribute('y1','0');
fadeGrad.setAttribute('x2','0'); fadeGrad.setAttribute('y2','1');
const stop1 = document.createElementNS('http://www.w3.org/2000/svg','stop');
stop1.setAttribute('offset','0%'); stop1.setAttribute('stop-color','black'); stop1.setAttribute('stop-opacity','0');
const stop2 = document.createElementNS('http://www.w3.org/2000/svg','stop');
stop2.setAttribute('offset','8%'); stop2.setAttribute('stop-color','white');
const stop3 = document.createElementNS('http://www.w3.org/2000/svg','stop');
stop3.setAttribute('offset','92%'); stop3.setAttribute('stop-color','white');
const stop4 = document.createElementNS('http://www.w3.org/2000/svg','stop');
stop4.setAttribute('offset','100%'); stop4.setAttribute('stop-color','black'); stop4.setAttribute('stop-opacity','0');
fadeGrad.appendChild(stop1); fadeGrad.appendChild(stop2);
fadeGrad.appendChild(stop3); fadeGrad.appendChild(stop4);
defs.appendChild(fadeGrad);
defs.appendChild(mask);

// 连接线渐变
const lineGrad = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
lineGrad.setAttribute('id','lineGrad');
lineGrad.setAttribute('x1','0%'); lineGrad.setAttribute('y1','0%');
lineGrad.setAttribute('x2','100%'); lineGrad.setAttribute('y2','0%');
const ls1 = document.createElementNS('http://www.w3.org/2000/svg','stop');
ls1.setAttribute('offset','0%'); ls1.setAttribute('stop-color','#3b82f6'); ls1.setAttribute('stop-opacity','0');
const ls2 = document.createElementNS('http://www.w3.org/2000/svg','stop');
ls2.setAttribute('offset','15%'); ls2.setAttribute('stop-color','#3b82f6'); ls2.setAttribute('stop-opacity','0.6');
const ls3 = document.createElementNS('http://www.w3.org/2000/svg','stop');
ls3.setAttribute('offset','85%'); ls3.setAttribute('stop-color','#3b82f6'); ls3.setAttribute('stop-opacity','0.6');
const ls4 = document.createElementNS('http://www.w3.org/2000/svg','stop');
ls4.setAttribute('offset','100%'); ls4.setAttribute('stop-color','#3b82f6'); ls4.setAttribute('stop-opacity','0');
lineGrad.appendChild(ls1); lineGrad.appendChild(ls2);
lineGrad.appendChild(ls3); lineGrad.appendChild(ls4);
defs.appendChild(lineGrad);

svg.appendChild(defs);

// 地图底图 — dotted map
const mapImg = document.createElementNS('http://www.w3.org/2000/svg','image');
mapImg.setAttribute('href','world-dots.svg');
mapImg.setAttribute('width','198');
mapImg.setAttribute('height','100');
mapImg.setAttribute('mask','url(#edgeFade)');
mapImg.setAttribute('opacity','0.85');
mapImg.style.pointerEvents = 'none';
svg.appendChild(mapImg);

// 连接线
const connGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
connGroup.setAttribute('id','connections');
CONNECTIONS.forEach(([aId, bId]) => {
  const cityA = CITIES.find(c => c.id === aId);
  const cityB = CITIES.find(c => c.id === bId);
  if (!cityA || !cityB) return;
  const pA = project(cityA.lat, cityA.lng);
  const pB = project(cityB.lat, cityB.lng);
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', curvePath(pA, pB));
  path.setAttribute('class','conn-line');
  connGroup.appendChild(path);
});
svg.appendChild(connGroup);

// 城市点
const cityGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
cityGroup.setAttribute('id','cities');
const cityEls = {};
let currentCity = null;

CITIES.forEach(city => {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('id','cityg-'+city.id);
  g.style.cursor = 'pointer';

  const pos = project(city.lat, city.lng);

  // 脉冲外圈
  const pulse = document.createElementNS('http://www.w3.org/2000/svg','circle');
  pulse.setAttribute('cx', String(pos.x));
  pulse.setAttribute('cy', String(pos.y));
  pulse.setAttribute('r','0.6');
  pulse.setAttribute('class','city-pulse');
  pulse.setAttribute('id','pulse-'+city.id);
  const animR = document.createElementNS('http://www.w3.org/2000/svg','animate');
  animR.setAttribute('attributeName','r');
  animR.setAttribute('from','0.6'); animR.setAttribute('to','2.2');
  animR.setAttribute('dur','1.5s'); animR.setAttribute('begin','0s');
  animR.setAttribute('repeatCount','indefinite');
  pulse.appendChild(animR);
  const animOp = document.createElementNS('http://www.w3.org/2000/svg','animate');
  animOp.setAttribute('attributeName','opacity');
  animOp.setAttribute('from','0.5'); animOp.setAttribute('to','0');
  animOp.setAttribute('dur','1.5s'); animOp.setAttribute('begin','0s');
  animOp.setAttribute('repeatCount','indefinite');
  pulse.appendChild(animOp);

  // 实心点
  const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx', String(pos.x));
  dot.setAttribute('cy', String(pos.y));
  dot.setAttribute('r','0.55');
  dot.setAttribute('class','city-dot');
  dot.setAttribute('id','dot-'+city.id);
  dot.dataset.cityId = city.id;
  dot.dataset.country = city.country;
  dot.dataset.label = city.name + ', ' + city.country;

  // 城市名标签
  const label = document.createElementNS('http://www.w3.org/2000/svg','text');
  label.setAttribute('x', String(pos.x + 0.9));
  label.setAttribute('y', String(pos.y + 0.4));
  label.setAttribute('fill','#94a3b8');
  label.setAttribute('font-size','2.2');
  label.setAttribute('font-family','system-ui, sans-serif');
  label.setAttribute('pointer-events','none');
  label.textContent = city.name;

  // 事件
  dot.addEventListener('mouseenter', () => {
    tooltip.textContent = city.name + ', ' + city.country;
    tooltip.classList.add('show');
  });
  dot.addEventListener('mouseleave', () => {
    tooltip.classList.remove('show');
  });
  dot.addEventListener('mousemove', e => {
    const rect = mapWrap.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 14) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
  });
  dot.addEventListener('click', () => selectCity(city.id));

  g.appendChild(pulse);
  g.appendChild(dot);
  g.appendChild(label);
  cityGroup.appendChild(g);
  cityEls[city.id] = g;
});
svg.appendChild(cityGroup);

// ==================== 快捷标签 ====================
const quickBar = document.getElementById('quickBar');
const quickRegions = [
  {id:"us",flag:"🇺🇸",name:"美国"},{id:"cn",flag:"🇨🇳",name:"中国"},
  {id:"hk",flag:"🇭🇰",name:"香港"},{id:"jp",flag:"🇯🇵",name:"日本"},
  {id:"uk",flag:"🇬🇧",name:"英国"},{id:"de",flag:"🇩🇪",name:"德国"},
  {id:"in",flag:"🇮🇳",name:"印度"},{id:"br",flag:"🇧🇷",name:"巴西"},
  {id:"sa",flag:"🇸🇦",name:"沙特"},{id:"ae",flag:"🇦🇪",name:"中东"},
  {id:"au",flag:"🇦🇺",name:"澳洲"},{id:"ru",flag:"🇷🇺",name:"俄罗斯"},
];
quickBar.innerHTML = quickRegions.map(r =>
  `<span class="quick-chip" data-id="${r.id}" onclick="selectCity('${r.id}')">${r.flag} ${r.name}</span>`
).join('');

// ==================== 交互逻辑 ====================
async function selectCity(cityId) {
  currentCity = cityId;
  const info = CITIES.find(c => c.id === cityId);

  // 高亮选中的城市点
  Object.values(cityEls).forEach(g => {
    const dot = g.querySelector('.city-dot');
    if (dot) dot.classList.remove('selected');
  });
  if (cityEls[cityId]) {
    const dot = cityEls[cityId].querySelector('.city-dot');
    if (dot) dot.classList.add('selected');
  }

  // 快捷标签
  document.querySelectorAll('.quick-chip').forEach(c => c.classList.remove('active'));
  const chip = document.querySelector(`.quick-chip[data-id="${cityId}"]`);
  if (chip) chip.classList.add('active');

  // 加载新闻
  const head = document.getElementById('newsHead');
  const body = document.getElementById('newsBody');
  const name = info ? info.country : cityId;
  head.innerHTML = info ? `${info.name}, ${info.country} 财经新闻` : `🌍 财经新闻`;
  body.innerHTML = '<div class="news-empty"><p>加载中…</p></div>';

  try {
    const data = await apiGet('/api/stocks/news/global/' + cityId);
    if (!data.news || !data.news.length) {
      body.innerHTML = `<div class="news-empty"><div class="news-empty-icon">📭</div><p>${name}暂无相关财经新闻</p></div>`;
      return;
    }

    body.innerHTML = data.news.map(n => `
      <div class="news-card" onclick="window.open('${(n.url||'').replace(/'/g,"\\'")}','_blank')">
        <div class="news-card-title">${n.title}</div>
        <div class="news-card-meta">
          <span>${n.date||''}</span><span>${n.source||''}</span>
        </div>
      </div>
    `).join('');
  } catch(e) {
    body.innerHTML = `<div class="news-empty"><p>加载失败: ${e.message}</p></div>`;
  }
}

// ==================== 页面初始化 ====================
initPage('global', '全球资讯');
selectCity('us');
</script>
</body>
</html>
